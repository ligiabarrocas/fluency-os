.phonetic-box span{color:#7dd3fc;font-size:12px;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}.pron-hidden{display:none}.phrase-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.phrase-card{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;padding:16px;margin:10px 0}.phrase-card .en{font-size:1.05rem}.song-levels{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:16px}.song-level-card{border:1px solid var(--line);border-radius:20px;padding:16px;background:rgba(255,255,255,.055);min-height:148px}.song-level-card.active{background:linear-gradient(135deg,rgba(139,92,246,.32),rgba(34,211,238,.12));border-color:rgba(34,211,238,.44)}.song-level-card b{font-size:22px}.song-structure{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px}.song-part{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.05)}.song-part b{display:block;color:white}.song-part span{display:block;color:var(--muted);font-size:12px;margin-top:6px}.wordmap-board{position:relative;border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at center,rgba(34,211,238,.15),transparent 34%),rgba(255,255,255,.04);padding:22px;overflow:hidden}.wordmap-core{margin:0 auto 18px;width:min(340px,100%);text-align:center;border-radius:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));padding:22px;box-shadow:0 18px 48px rgba(34,211,238,.18)}.wordmap-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.word-node{border:1px solid var(--line);border-radius:20px;background:rgba(11,16,32,.82);padding:15px}.word-node h4{margin:0 0 8px}.word-node .mini-line{border-top:1px solid rgba(255,255,255,.1);padding-top:8px;margin-top:8px}.word-family{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.word-family span{border:1px solid rgba(139,92,246,.32);background:rgba(139,92,246,.15);border-radius:999px;padding:5px 8px;font-size:12px}.pron-toggle-global{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(34,211,238,.33);background:rgba(34,211,238,.09);border-radius:999px;padding:8px 12px;color:#dffbff;font-weight:800}.audio-speed-note{font-size:12px;color:var(--muted);margin-top:6px}.music-warning{border-left:4px solid var(--warn);background:rgba(245,158,11,.08);border-radius:14px;padding:12px;color:#ffe6b1}.level-ribbon{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.level-ribbon span{font-size:12px;border-radius:999px;padding:6px 9px;background:rgba(255,255,255,.06);border:1px solid var(--line)}
@media(max-width:980px){.song-levels,.wordmap-grid,.song-structure{grid-template-columns:1fr}.phrase-tools .btn{flex:1 1 45%}}
</style>
<script id="v08-script">
(function(){
  window.FL_V08 = true;
  const get = id => document.getElementById(id);
  function h(s){return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  const PHONETIC_DICT={
    'i':'ai','am':'ém','i\'m':'aim','need':'nid','help':'help','with':'uíth','this':'dhis','task':'tásk','you':'iú','could':'kud','would':'wud','should':'shud','give':'guiv','us':'ãs','a':'ã','an':'ãn','quick':'kuík','status':'sté-rãs','update':'ãp-deit','project':'pró-djekt','the':'dhã','to':'tu','team':'tim','meeting':'mí-ting','today':'tu-dei','tomorrow':'tu-mó-rou','please':'pliz','can':'kén','we':'uí','are':'ar','were':'uãr','was':'uóz','have':'hév','has':'héz','had':'héd','work':'uãrk','working':'uãr-king','worked':'uãrkt','on':'ón','in':'in','for':'fór','from':'frãm','about':'ã-baut','because':'bi-kóz','but':'bãt','and':'énd','or':'ór','not':'nót','more':'mór','less':'lés','clear':'klir','clearly':'klir-li','aligned':'ã-laind','align':'ã-lain','stakeholders':'steik-houl-dãrz','client':'klai-ãnt','customer':'kãs-tã-mãr','deadline':'ded-lain','risk':'risk','issue':'í-shu','bug':'bãg','bugs':'bãgz','test':'test','testing':'tés-ting','data':'dei-tã','product':'pró-dãkt','catalog':'ké-tã-lóg','architecture':'ar-ki-tek-tchãr','architect':'ar-ki-tekt','engineer':'en-djã-nír','manager':'mé-nã-djãr','developer':'di-vé-lã-pãr','designer':'di-zai-nãr','analyst':'é-nã-list','security':'si-kiúr-ã-ti','governance':'gó-vãr-nãns','observability':'ób-zãr-vã-bí-li-ti','interoperability':'in-tãr-óp-ã-rã-bí-li-ti','generative':'djé-nã-rã-tiv','artificial':'ar-tã-fí-shãl','intelligence':'in-té-lã-djãns','sdk':'és-di-kei','api':'ei-pi-ai','cloud':'klaud','deploy':'di-plói','release':'ri-lís','review':'ri-viú','daily':'dei-li','retro':'ré-trou','retrospective':'ré-trou-spék-tiv','sprint':'sprint','backlog':'bék-lóg','scope':'skoup','timeline':'taim-lain','budget':'bã-djãt','lead':'lid','leading':'lí-ding','led':'led','listen':'lí-sãn','speak':'spik','speaking':'spí-king','write':'rait','writing':'rai-ting','read':'rid','reading':'rí-ding','learn':'lãrn','learning':'lãr-ning','practice':'prék-tis','progress':'próu-gres','confident':'kón-fi-dãnt','confidence':'kón-fi-dãns','sing':'sing','singing':'sín-ging','song':'sóng','music':'miu-zik','voice':'vóis','slow':'slou','normal':'nór-mãl'
  };
  window.phoneticApprox = function(text){
    return String(text||'').toLowerCase().replace(/[“”]/g,'').replace(/[^a-z0-9'\s-]/g,'').split(/\s+/).filter(Boolean).map(w=>PHONETIC_DICT[w]||w.replace(/^th/,'dh').replace(/th/g,'th').replace(/tion$/,'shãn').replace(/ing$/,'ing').replace(/oo/g,'u').replace(/ee/g,'i')).join(' ');
  };
  window.togglePron = function(id){ const el=get(id); if(el) el.classList.toggle('pron-hidden'); };
  window.toggleAllPron = function(){
    const cur=localStorage.getItem('fluencyos_show_pron')==='1'; localStorage.setItem('fluencyos_show_pron',cur?'0':'1'); render(); toast(cur?'Pronúncia aproximada ocultada.':'Pronúncia aproximada ativada.');
  };
  window.phraseBlock = function(en,pt,extra=''){
    const id='pr_'+Math.random().toString(36).slice(2);
    const show=localStorage.getItem('fluencyos_show_pron')==='1';
    return `<div class="phrase-card"><p class="en">${h(en)}</p>${pt?`<p class="pt">${h(pt)}</p>`:''}${extra?`<p class="muted mini">${extra}</p>`:''}<div id="${id}" class="phonetic-box ${show?'':'pron-hidden'}"><span>Como pronunciar aproximado</span>${h(phoneticApprox(en))}</div><div class="phrase-tools"><button class="btn" onclick="togglePron('${id}')">👄 Mostrar pronúncia</button><button class="btn" onclick="safeSpeak('${esc(en)}',.68,true)">🐢 Ouvir lento</button><button class="btn primary" onclick="safeSpeak('${esc(en)}',1,true)">▶️ Ouvir normal</button><button class="btn" onclick="practicePhrase('${esc(en)}','${esc(pt||'')}')">🎤 Gravar</button></div><div class="audio-speed-note">Use lento para imitar sons; use normal para treinar ritmo real.</div></div>`;
  };
  window.fullSongLevels = [
    {level:'A2',days:45,goal:'músicas lentas, frases curtas, refrões claros',songs:[
      song('Coldplay','Yellow','A2','vogais longas e emoção simples',['I can sing slowly and clearly.','This song helps me feel the rhythm.','I am learning English one line at a time.'],['Posso cantar devagar e com clareza.','Essa música me ajuda a sentir o ritmo.','Estou aprendendo inglês uma linha por vez.']),
      song('Coldplay','Paradise','A2/B1','vocabulário simples e repetição',['Every day is part of my journey.','I am looking for a better way to speak.','I can practice with confidence.'],['Todo dia faz parte da minha jornada.','Estou procurando uma forma melhor de falar.','Posso praticar com confiança.']),
      song('Imagine Dragons','Not Today','A2/B1','frases emocionais e ritmo moderado',['I can try again tomorrow.','I do not need to speak perfectly today.','I just need to keep practicing.'],['Posso tentar de novo amanhã.','Não preciso falar perfeitamente hoje.','Só preciso continuar praticando.'])]},
    {level:'B1',days:60,goal:'refrões memoráveis, connected speech, confiança',songs:[
      song('Imagine Dragons','Demons','B1','contraste emocional e sons /d/ /m/',['I want to explain what I feel clearly.','Sometimes I speak slowly to sound better.','I can control my rhythm and my voice.'],['Quero explicar claramente o que sinto.','Às vezes falo devagar para soar melhor.','Posso controlar meu ritmo e minha voz.']),
      song('Coldplay','Fix You','B1','entoação, apoio emocional e frases naturais',['I can help you with this task.','We can fix this step by step.','I will listen before I suggest a solution.'],['Posso te ajudar com essa tarefa.','Podemos corrigir isso passo a passo.','Vou escutar antes de sugerir uma solução.']),
      song('OneRepublic','Counting Stars','B1/B2','plural e ritmo pop',['I am counting small wins every week.','My goals are clear and realistic.','I can measure progress with simple habits.'],['Estou contando pequenas vitórias toda semana.','Minhas metas são claras e realistas.','Posso medir progresso com hábitos simples.'])]},
    {level:'B2',days:75,goal:'frases mais longas, storytelling, velocidade',songs:[
      song('Imagine Dragons','Thunder','B2','energia, /th/ e frase rápida',['I used to be afraid of speaking in meetings.','Now I turn pressure into practice.','I can use my voice with more confidence.'],['Eu tinha medo de falar em reuniões.','Agora transformo pressão em prática.','Posso usar minha voz com mais confiança.']),
      song('Coldplay','Viva la Vida','B2','passado, narrativa e contraste',['I used to lead every discussion, but now I listen more.','The situation changed faster than expected.','We need to understand the story behind the decision.'],['Eu costumava liderar toda discussão, mas agora escuto mais.','A situação mudou mais rápido que o esperado.','Precisamos entender a história por trás da decisão.']),
      song('Bastille','Pompeii','B2','perguntas e entonação',['How am I going to explain this clearly?','What can we learn from this situation?','Can we rebuild the plan together?'],['Como vou explicar isso claramente?','O que podemos aprender com essa situação?','Podemos reconstruir o plano juntos?'])]},
    {level:'C1',days:90,goal:'emoção, nuance, opinião e argumentação',songs:[
      song('Imagine Dragons','Believer','C1','intensidade e pronúncia forte',['I have learned to turn discomfort into discipline.','When I struggle, I slow down and rebuild the sentence.','Fluency comes from repetition, emotion and real use.'],['Aprendi a transformar desconforto em disciplina.','Quando tenho dificuldade, desacelero e reconstruo a frase.','Fluência vem de repetição, emoção e uso real.']),
      song('Coldplay','The Scientist','C1','storytelling reflexivo',['I looked at the problem from another angle before making a decision.','We went back to understand the root cause instead of blaming people.','I want to explain clearly what happened and what we learned.'],['Olhei o problema por outro ângulo antes de decidir.','Voltamos para entender a causa raiz em vez de culpar pessoas.','Quero explicar claramente o que aconteceu e o que aprendemos.']),
      song('The Script','Hall of Fame','C1','motivação e discurso',['I could lead a conversation in English if I prepare the key messages first.','My effort today will help my future self communicate with confidence.','I want to be clear, respectful and direct when I speak.'],['Eu poderia liderar uma conversa em inglês se preparar as mensagens principais antes.','Meu esforço hoje vai ajudar meu eu do futuro a se comunicar com confiança.','Quero ser clara, respeitosa e direta quando falo.'])]},
    {level:'C2',days:120,goal:'performance natural, metáforas, storytelling e presença',songs:[
      song('Coldplay','Clocks','C2','ritmo contínuo e precisão',['I can keep the rhythm while expressing complex ideas naturally.','Even when the sentence is long, I can control stress and intonation.','My goal is not perfection; my goal is presence and clarity.'],['Consigo manter o ritmo enquanto expresso ideias complexas naturalmente.','Mesmo quando a frase é longa, consigo controlar tonicidade e entonação.','Minha meta não é perfeição; minha meta é presença e clareza.']),
      song('Imagine Dragons','Whatever It Takes','C2','velocidade e articulação',['I am willing to practice consistently until my speech becomes automatic.','The more I repeat meaningful phrases, the more natural English feels.','I can adapt my tone depending on the audience and the context.'],['Estou disposta a praticar com consistência até minha fala ficar automática.','Quanto mais repito frases significativas, mais natural o inglês parece.','Posso adaptar meu tom conforme a audiência e o contexto.']),
      song('The Killers','Human','C2','nuance e interpretação',['I can express uncertainty without sounding weak or insecure.','I can disagree respectfully while keeping the conversation productive.','I can use rhythm, pauses and emphasis to sound more natural.'],['Posso expressar incerteza sem parecer fraca ou insegura.','Posso discordar com respeito mantendo a conversa produtiva.','Posso usar ritmo, pausas e ênfase para soar mais natural.'])]}
  ];
  function song(artist,title,level,focus,practice,pt){return {artist,title,level,focus,practice,pt,structure:['Contexto: escute a introdução e sinta o ritmo.','Verso: leia a ideia geral, sem traduzir palavra por palavra.','Refrão: treine repetição e emoção.','Ponte: observe mudança de energia.','Final: cante inteiro e grave sua voz.']};}
  window.wordMaps = [
    {area:'Fluência',core:'speak',pt:'falar',family:['speak','speaker','speech','speaking','spoken'],phrases:[['I need to speak more confidently.','Preciso falar com mais confiança.'],['She is a clear speaker.','Ela fala com clareza.']]},
    {area:'Música',core:'sing',pt:'cantar',family:['sing','singer','song','singing','sang','sung'],phrases:[['I like singing to practice pronunciation.','Gosto de cantar para praticar pronúncia.'],['This song helps my rhythm.','Essa música ajuda meu ritmo.']]},
    {area:'Trabalho',core:'align',pt:'alinhar',family:['align','aligned','alignment','misaligned'],phrases:[['We need to align expectations.','Precisamos alinhar expectativas.'],['The teams are not aligned yet.','Os times ainda não estão alinhados.']]},
    {area:'Projetos',core:'deliver',pt:'entregar',family:['deliver','delivery','deliverable','delivered'],phrases:[['We need to deliver value, not only tasks.','Precisamos entregar valor, não apenas tarefas.'],['The main deliverable is ready.','A principal entrega está pronta.']]},
    {area:'Dados',core:'govern',pt:'governar',family:['govern','governance','governed','governable'],phrases:[['Data governance must be practical.','Governança de dados precisa ser prática.'],['This catalog helps us govern access.','Esse catálogo nos ajuda a governar acesso.']]},
    {area:'IA',core:'generate',pt:'gerar',family:['generate','generation','generative','generated'],phrases:[['Generative AI can speed up repetitive work.','IA generativa pode acelerar trabalho repetitivo.'],['The model generated a useful summary.','O modelo gerou um resumo útil.']]},
    {area:'Arquitetura',core:'integrate',pt:'integrar',family:['integrate','integration','integrated','interoperability'],phrases:[['The systems need to integrate safely.','Os sistemas precisam integrar com segurança.'],['Interoperability reduces manual work.','Interoperabilidade reduz trabalho manual.']]},
    {area:'Qualidade',core:'test',pt:'testar',family:['test','testing','tested','testable'],phrases:[['We need to test the critical flow first.','Precisamos testar o fluxo crítico primeiro.'],['The feature is testable now.','A funcionalidade já é testável.']]},
    {area:'Observabilidade',core:'observe',pt:'observar/monitorar',family:['observe','observable','observability','observation'],phrases:[['Observability helps us find issues faster.','Observabilidade nos ajuda a encontrar problemas mais rápido.'],['The service is not observable enough.','O serviço não é observável o suficiente.']]}
  ];
  if(!NAV.some(n=>n[0]==='wordmap')) NAV.splice(14,0,['wordmap','🕸️','Mapa de Palavras']);
  window.hero = function(){
    const done=completedDays(); const total=totalPlanDays(); const pct=Math.min(100,Math.round(done/total*100));
    get('hero').innerHTML=`<div class="hero-card"><span class="kicker">⚡ v0.8 music + pronunciation</span><h2>FluencyOS: inglês prático, profissional e musical para destravar a fala.</h2><p>Agora o app tem trilha musical por nível, mapa de palavras, pronúncia aproximada em frases e áudio lento/normal em todos os treinos principais.</p><div class="hero-actions"><button class="btn primary" onclick="go('music')">Abrir Music Lab</button><button class="btn" onclick="go('wordmap')">Ver mapa de palavras</button><button class="pron-toggle-global" onclick="toggleAllPron()">👄 Alternar pronúncia nas frases</button></div></div><div class="card"><span class="pill">Progresso geral</span><div style="height:18px"></div><div class="score">${pct}%</div><p class="muted">${done} entregas marcadas de ${total} dias planejados.</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="level-ribbon"><span>A2 base</span><span>B1 conversação</span><span>B2 trabalho</span><span>C1 liderança</span><span>C2 performance</span></div></div>`;
  };
  window.render = function(){ hero(); const r=state.route; if(r==='dashboard') dashboard(); if(r==='method') method(); if(r==='map') map(); if(r==='curriculum') curriculum(); if(r==='plan') plan(); if(r==='verbs') verbs(); if(r==='expressions') expressions(); if(r==='grammar') grammar(); if(r==='pronunciation') pronunciation(); if(r==='speaking') speaking(); if(r==='writing') writing(); if(r==='tech') tech(); if(r==='scenes') scenes(); if(r==='music') music(); if(r==='wordmap') wordmap(); if(r==='flashcards') flashcards(); if(r==='ai') ai(); if(r==='audio') audio(); };
  window.dashboard=function(){
    const cards=[['map','🗺️','Mapa Mental','Visão visual da fluência.'],['curriculum','🧭','Trilha A2→Fluente','Plano longo com aumento de dificuldade.'],['wordmap','🕸️','Mapa de Palavras','Famílias de palavras, frases e uso real.'],['music','🎵','Music Lab','Aprenda inglês cantando por nível.'],['verbs','🔤','Verbos','Base, passado, particípio e frases.'],['expressions','💬','Expressões','Frases prontas para destravar.'],['grammar','📐','Gramática','Regras objetivas com uso correto.'],['pronunciation','🎧','Pronúncia','Sons difíceis, ritmo e connected speech.'],['tech','💻','Tech & Data','Vocabulário profissional de tecnologia.'],['scenes','🎬','Cenas','Simulações de conversas reais.'],['writing','✍️','Writing','E-mails, mensagens e correção local.'],['ai','🤖','AI Coach','Prompts e arquitetura para IA real.']];
    get('view').innerHTML=`<div class="section-title"><div><h3>Seu sistema de fluência</h3><p>Escolha uma área e pratique com frase, tradução, pronúncia aproximada e áudio lento/normal.</p></div><button class="pron-toggle-global" onclick="toggleAllPron()">👄 Mostrar/ocultar pronúncia</button></div><div class="grid">${cards.map(c=>`<div class="col-4"><div class="module-card"><div class="icon">${c[1]}</div><h4>${c[2]}</h4><p>${c[3]}</p><button class="btn" onclick="go('${c[0]}')">Abrir módulo</button></div></div>`).join('')}</div>`;
  };
  window.wordmap=function(){
    get('view').innerHTML=`<div class="section-title"><div><h3>Mapa de Palavras</h3><p>Aprenda palavras por família, contexto e frases. Isso acelera leitura, fala e escrita.</p></div><button class="pron-toggle-global" onclick="toggleAllPron()">👄 Pronúncia nas frases</button></div><div class="wordmap-board"><div class="wordmap-core"><h3>Word Families</h3><p>Uma palavra vira verbo, substantivo, adjetivo, expressão e frase real.</p></div><div class="wordmap-grid">${wordMaps.map(w=>`<div class="word-node"><span class="tag">${w.area}</span><h4>${w.core} <small class="muted">${w.pt}</small></h4><div class="word-family">${w.family.map(f=>`<span>${f}</span>`).join('')}</div>${w.phrases.map(p=>`<div class="mini-line">${phraseBlock(p[0],p[1])}</div>`).join('')}</div>`).join('')}</div></div>`;
  };
  window.verbs=function(){
    const q=(get('verbSearch')?.value||'').toLowerCase(); const list=DATA.verbs.filter(v=>[v.base,v.pt,v.example,v.translation].join(' ').toLowerCase().includes(q));
    get('view').innerHTML=`<div class="section-title"><div><h3>Verbos essenciais</h3><p>Com frase, tradução, pronúncia aproximada e áudio lento/normal.</p></div><button class="btn primary" onclick="startVerbQuiz()">Quiz</button></div><input class="search" id="verbSearch" placeholder="Buscar verbo, exemplo ou tradução" oninput="verbs()" value="${h(q)}"><div class="grid">${list.slice(0,80).map(v=>`<div class="col-6"><div class="lesson"><h4>${v.base} <span class="tag">${v.past}</span> <span class="tag">${v.participle}</span></h4><p class="pt">${v.pt}</p>${phraseBlock(v.example,v.translation)}</div></div>`).join('')}</div>`;
  };
  window.expressions=function(){
    const cats=['all',...new Set(DATA.expressions.map(e=>e.category))]; const list=DATA.expressions.filter(e=>state.filter==='all'||e.category===state.filter);
    get('view').innerHTML=`<div class="section-title"><div><h3>Expressões práticas</h3><p>Frases prontas para reuniões, escrita, projetos e conversas.</p></div><button class="pron-toggle-global" onclick="toggleAllPron()">👄 Pronúncia</button></div><div class="tabs">${cats.map(c=>`<button class="tab ${state.filter===c?'active':''}" onclick="state.filter='${c}';expressions()">${c==='all'?'Todas':c}</button>`).join('')}</div><div class="grid">${list.map(e=>`<div class="col-6"><div class="lesson"><span class="tag">${e.category}</span>${phraseBlock(e.en,e.pt,e.usage)}${e.note?`<p class="quote">${e.note}</p>`:''}</div></div>`).join('')}</div>`;
  };
  window.tech=function(){
    const areas=['all',...new Set(DATA.techTerms.map(t=>t.area))]; const terms=DATA.techTerms.filter(t=>state.techFilter==='all'||t.area===state.techFilter);

sta</b><p>Escreva uma resposta curta confirmando presença, fazendo uma pergunta ou conectando com seu trabalho.</p></div></div></div></div></div><div class="card"><h3>Responder esse e-mail</h3><textarea class="textarea" id="emailReply" placeholder="Hi team, thanks for sharing. I would like to join because..."></textarea><div class="hero-actions"><button class="btn good" onclick="localWritingCheck('emailReply','emailFeedback')">Corrigir localmente</button><button class="btn" onclick="copyInboxPrompt()">Copiar prompt para IA</button></div><div id="emailFeedback"></div></div>`;

<script id="v10-script">
(function(){

  const prevRenderV10 = window.render;

  function cue(en){

      'I need help with this task.':'ai nid help uíth dhis tásk','Could you give us a quick status update?':'kud iú guiv ãss ã kuík stêi-tãs ãp-dêit','I will follow up with the team and confirm the next steps.':'ai wil fó-lou ãp uíth dhã tim änd kãn-fãrm dhã nékst stéps','We have a blocker related to the integration tests.':'ui hév ã bló-kãr ri-lêi-tãd tu dhi in-tã-grêi-shãn tésts','Let me clarify the scope before we commit to a new deadline.':'let mi klé-rã-fai dhã skôup bi-fór ui kã-mít tu ã niu déd-lain','The architecture decision depends on scalability, security, and maintainability.':'dhi ár-ki-tek-tchãr di-sí-jãn di-péndz on skei-lã-bí-lã-ti si-kiú-rã-ti änd mein-têi-nã-bí-lã-ti','We should document the assumption and review it with stakeholders.':'ui shud dó-kiu-mént dhi ã-sãmp-shãn änd ri-viú it uíth stêik-hôul-dãrz','Can we align on the priority before the planning session?':'kãn ui ã-láin on dhã prai-ó-rã-ti bi-fór dhã plé-ning sé-shãn','I understand the concern, and I will bring options to the next meeting.':'ai ãn-dãr-sténd dhã kãn-sãrn änd ai wil bring óp-shãnz tu dhã nékst mí-ting','We need to make the decision visible and easy to revisit.':'ui nid tu mêik dhã di-sí-jãn ví-zã-bãl änd í-zi tu ri-ví-zit'
    };

  }

  };
  const PM_DAYS=[
    {day:1,level:'A2',theme:'Pedir ajuda sem travar',objective:'Conseguir pedir ajuda, confirmar entendimento e fechar próximos passos.',grammar:'Can / Could + verbo base',verbs:['need','help','check','confirm','send'],words:['task','deadline','question','context','next step','owner','priority','meeting'],phrases:[['I need help with this task.','Preciso de ajuda com esta tarefa.'],['Can you check this with me?','Você pode verificar isso comigo?'],['I have a quick question about the deadline.','Tenho uma pergunta rápida sobre o prazo.'],['Could you send me more context?','Você poderia me enviar mais contexto?']],dialogue:[['PM','I need help with this task.','Preciso de ajuda com esta tarefa.'],['Developer','Sure. What is blocking you?','Claro. O que está te bloqueando?'],['PM','I need more context before I confirm the deadline.','Preciso de mais contexto antes de confirmar o prazo.']],writing:'Escreva uma mensagem curta pedindo ajuda para alguém do time.'},
    {day:2,level:'A2',theme:'Status simples',objective:'Dar uma atualização curta e compreensível.',grammar:'Simple Present para rotina e status',verbs:['work','finish','start','update','share'],words:['status','progress','risk','blocked','done','in progress','today','tomorrow'],phrases:[['The task is in progress.','A tarefa está em andamento.'],['We are waiting for one confirmation.','Estamos aguardando uma confirmação.'],['I will share an update tomorrow.','Vou compartilhar uma atualização amanhã.'],['The main risk is the deadline.','O principal risco é o prazo.']],dialogue:[['PM','Could you give us a quick status update?','Você poderia nos dar uma atualização rápida do status?'],['QA','Testing is in progress, but one scenario is blocked.','Os testes estão em andamento, mas um cenário está bloqueado.'],['PM','Thanks. I will add this risk to the report.','Obrigada. Vou adicionar esse risco ao relatório.']],writing:'Escreva um status de 3 frases sobre um projeto fictício.'},
    {day:3,level:'A2',theme:'Confirmar entendimento',objective:'Evitar mal-entendido em reuniões.',grammar:'Do/Does + perguntas simples',verbs:['understand','mean','repeat','explain','clarify'],words:['requirement','scope','note','decision','assumption','meeting notes','action item','dependency'],phrases:[['Let me clarify the requirement.','Deixe-me esclarecer o requisito.'],['Do you mean the first option or the second one?','Você quer dizer a primeira opção ou a segunda?'],['Can you repeat the last point?','Você pode repetir o último ponto?'],['I want to make sure I understood correctly.','Quero garantir que entendi corretamente.']],dialogue:[['PM','I want to make sure I understood correctly.','Quero garantir que entendi corretamente.'],['Product Owner','Yes, the scope is only the first workflow.','Sim, o escopo é apenas o primeiro fluxo.'],['PM','Great, I will document that assumption.','Ótimo, vou documentar essa premissa.']],writing:'Transforme uma dúvida em uma pergunta educada em inglês.'},
    {day:4,level:'B1',theme:'Daily com QA e Dev',objective:'Conduzir uma daily curta com bloqueios e ações.',grammar:'Present Continuous para andamento',verbs:['test','review','fix','deploy','monitor'],words:['bug','defect','test case','pull request','environment','release','blocker','workaround'],phrases:[['We have a blocker related to the integration tests.','Temos um bloqueio relacionado aos testes de integração.'],['The developer is fixing the bug now.','O desenvolvedor está corrigindo o bug agora.'],['QA is reviewing the critical scenarios.','QA está revisando os cenários críticos.'],['We need a workaround for today.','Precisamos de uma solução temporária para hoje.']],dialogue:[['PM','Any blockers for today?','Algum bloqueio para hoje?'],['QA','The test environment is unstable.','O ambiente de testes está instável.'],['Developer','I am checking the logs now.','Estou verificando os logs agora.'],['PM','Please share the update before the end of the day.','Por favor, compartilhe a atualização antes do fim do dia.']],writing:'Crie uma ata curta de daily com bloqueio, dono e próxima ação.'},
    {day:5,level:'B1',theme:'E-mail profissional',objective:'Responder convites, webinars e comunicados.',grammar:'Would like to / I am interested in',verbs:['join','attend','learn','explore','improve'],words:['session','overview','hands-on','techniques','efficiency','consumption','value','feature usage'],phrases:[['I would like to join the session.','Eu gostaria de participar da sessão.'],['I am interested in learning more about cost optimization.','Tenho interesse em aprender mais sobre otimização de custos.'],['This topic is relevant to our team.','Esse tema é relevante para nosso time.'],['Could you share the recording afterwards?','Você poderia compartilhar a gravação depois?']],dialogue:[['PM','This session may help us improve day-to-day efficiency.','Essa sessão pode nos ajudar a melhorar a eficiência do dia a dia.'],['Developer','I want to learn better prompting from the IDE.','Quero aprender melhor prompting direto da IDE.'],['PM','Great. Let’s capture the main practices after the session.','Ótimo. Vamos registrar as principais práticas depois da sessão.']],writing:'Escreva uma resposta confirmando presença em uma sessão sobre GitHub Copilot.'},
    {day:6,level:'B1',theme:'Produto e dados',objective:'Falar sobre catálogo, produto de dados e consumidores.',grammar:'There is / There are',verbs:['publish','catalog','consume','define','measure'],words:['data product','catalog','consumer','owner','quality','lineage','contract','SLO'],phrases:[['There is a new data product in the catalog.','Há um novo produto de dados no catálogo.'],['We need to define the data owner.','Precisamos definir o responsável pelo dado.'],['The consumer needs reliable documentation.','O consumidor precisa de documentação confiável.'],['Data quality should be visible to the team.','A qualidade dos dados deve estar visível para o time.']],dialogue:[['PM','Who is the owner of this data product?','Quem é o responsável por este produto de dados?'],['Data Engineer','The domain team owns it, but we need better documentation.','O time de domínio é responsável, mas precisamos de documentação melhor.'],['PM','Let’s add quality metrics and support details to the catalog.','Vamos adicionar métricas de qualidade e detalhes de suporte ao catálogo.']],writing:'Escreva uma descrição curta de um produto de dados.'},
    {day:7,level:'B2',theme:'Arquitetura e decisão',objective:'Explicar trade-offs com clareza.',grammar:'Because / however / therefore',verbs:['design','scale','maintain','secure','integrate'],words:['architecture','scalability','maintainability','interoperability','security','trade-off','constraint','decision record'],phrases:[['The architecture decision depends on scalability, security, and maintainability.','A decisão de arquitetura depende de escalabilidade, segurança e manutenibilidade.'],['This option is faster; however, it creates more operational risk.','Esta opção é mais rápida; porém, cria mais risco operacional.'],['We should document the trade-off before moving forward.','Devemos documentar o trade-off antes de seguir.'],['Interoperability is important for future integrations.','Interoperabilidade é importante para integrações futuras.']],dialogue:[['PM','Can you explain the main trade-off?','Você pode explicar o principal trade-off?'],['Architect','Option A is faster, but option B is easier to maintain.','A opção A é mais rápida, mas a opção B é mais fácil de manter.'],['PM','Let’s document the decision and review the risks with security.','Vamos documentar a decisão e revisar os riscos com segurança.']],writing:'Escreva um decision log com decisão, motivo e risco.'},
    {day:8,level:'B2',theme:'Escopo e prazo',objective:'Negociar prazo sem parecer insegura.',grammar:'If clauses tipo 1',verbs:['commit','reduce','extend','prioritize','deliver'],words:['scope','deadline','capacity','milestone','impact','priority','dependency','trade-off'],phrases:[['If we keep the full scope, we may need to extend the deadline.','Se mantivermos o escopo completo, talvez precisemos estender o prazo.'],['Can we align on the priority before the planning session?','Podemos alinhar a prioridade antes da planning?'],['We can deliver the core flow first and add enhancements later.','Podemos entregar o fluxo principal primeiro e adicionar melhorias depois.'],['The team does not have enough capacity for all items.','O time não tem capacidade suficiente para todos os itens.']],dialogue:[['PM','If we keep the full scope, we may need to extend the deadline.','Se mantivermos o escopo completo, talvez precisemos estender o prazo.'],['Product Owner','Which items can move to the next release?','Quais itens podem ir para a próxima release?'],['PM','I suggest we keep the core flow and move the enhancements.','Sugiro manter o fluxo principal e mover as melhorias.']],writing:'Escreva uma mensagem propondo redução de escopo.'},
    {day:9,level:'B2',theme:'Observabilidade e incidente',objective:'Falar de logs, métricas e impacto.',grammar:'Past Simple + Present Perfect',verbs:['detect','investigate','resolve','monitor','recover'],words:['incident','observability','logs','metrics','alert','root cause','impact','recovery'],phrases:[['We detected the incident through an alert.','Detectamos o incidente por meio de um alerta.'],['The team has resolved the main issue.','O time resolveu o problema principal.'],['We are monitoring the system after the recovery.','Estamos monitorando o sistema após a recuperação.'],['The root cause is still under investigation.','A causa raiz ainda está em investigação.']],dialogue:[['SRE','We detected the incident through an alert.','Detectamos o incidente por meio de um alerta.'],['PM','What is the current customer impact?','Qual é o impacto atual para o cliente?'],['SRE','The system has recovered, but we are monitoring closely.','O sistema se recuperou, mas estamos monitorando de perto.']],writing:'Escreva um update de incidente em 5 linhas.'},
    {day:10,level:'B2',theme:'Governança e segurança',objective:'Falar de política, acesso e evidência.',grammar:'Passive voice prático',verbs:['approve','restrict','audit','document','review'],words:['governance','access control','policy','exception','evidence','audit trail','compliance','risk approval'],phrases:[['Access should be reviewed before production.','O acesso deve ser revisado antes da produção.'],['The exception was approved by security.','A exceção foi aprovada pela segurança.'],['We need evidence for the audit trail.','Precisamos de evidência para a trilha de auditoria.'],['The policy must be clear and easy to follow.','A política precisa ser clara e fácil de seguir.']],dialogue:[['Security','Access should be reviewed before production.','O acesso deve ser revisado antes da produção.'],['PM','What evidence do we need for approval?','Que evidência precisamos para aprovação?'],['Security','We need the risk assessment and the exception deadline.','Precisamos da avaliação de risco e do prazo da exceção.']],writing:'Crie uma pergunta educada para o time de segurança.'},
    {day:11,level:'C1',theme:'Status executivo',objective:'Apresentar status, riscos e decisões para liderança.',grammar:'Although / despite / while',verbs:['summarize','recommend','mitigate','escalate','forecast'],words:['executive summary','mitigation plan','forecast','risk exposure','decision needed','dependency','confidence level','timeline'],phrases:[['Although the timeline is tight, the team has a mitigation plan.','Embora o cronograma esteja apertado, o time tem um plano de mitigação.'],['The main decision needed today is whether to reduce scope or extend the deadline.','A principal decisão necessária hoje é reduzir escopo ou estender o prazo.'],['Our confidence level is medium because one dependency is still open.','Nosso nível de confiança é médio porque uma dependência ainda está em aberto.'],['I recommend escalating this risk before it affects the release.','Recomendo escalar esse risco antes que ele afete a release.']],dialogue:[['Executive','What decision do you need from us today?','Que decisão você precisa de nós hoje?'],['PM','We need to decide whether to reduce scope or extend the deadline.','Precisamos decidir se reduzimos escopo ou estendemos o prazo.'],['Executive','What is your recommendation?','Qual é sua recomendação?'],['PM','I recommend reducing scope to protect quality and release confidence.','Recomendo reduzir escopo para proteger qualidade e confiança da release.']],writing:'Escreva um executive summary com status, risco, impacto e decisão.'},

  function sentences(text){return String(text||'').replace(/\s+/g,' ').match(/[^.!?\n]+[.!?]?/g)?.map(s=>s.trim()).filter(s=>s.length>2)||[];}
  function words(text){return String(text||'').toLowerCase().match(/[a-z][a-z'-]+/g)||[];}
  function uniqTop(arr,n=24){const m={};arr.forEach(w=>{if(w.length>2&&!stop.has(w))m[w]=(m[w]||0)+1});return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,n);}

  function detectGrammar(text){const t=' '+text.toLowerCase()+' ';const hits=[];const add=(name,why,ex)=>hits.push({name,why,ex});if(/\b(can|could|should|would|may|might|must)\b/.test(t)) add('Modal verbs','Can, could, should, would, may e must ajudam a pedir, sugerir, negociar e falar de possibilidade.','Could you clarify the priority?');if(/\b(have|has|had)\s+[a-z]+(ed|en|wn|ne|t)\b/.test(t)) add('Present perfect / perfect forms','Use para experiência, resultado ou algo que começou no passado e ainda importa agora.','We have improved the process.');if(/\b(will|going to)\b/.test(t)) add('Future','Will costuma indicar decisão/promessa/previsão; going to indica plano/intenção.','We will follow up tomorrow.');if(/\b(is|are|was|were|be|been|being)\s+[a-z]+ed\b/.test(t)) add('Passive voice','Use quando a ação/resultado é mais importante que quem fez. Muito comum em comunicados e relatórios.','The details will be updated later.');if(/\b(more|less|better|worse|faster|slower|easier|harder)\b/.test(t)) add('Comparatives','Usado para comparar impacto, risco, prioridade, custo ou melhoria.','This approach is more efficient.');if(/\b(that|which|who|where)\b/.test(t)) add('Relative clauses','Conecta ideias e deixa frases mais longas e naturais.','A team that conducts research.');if(/\b(if|unless|when|while)\b/.test(t)) add('Conditionals / time clauses','Ajuda a explicar cenários, condições, riscos e próximos passos.','If this happens, we will adjust the plan.');if(/\b(wrap up|follow up|reach out|set up|look into|bring up|carry on|figure out)\b/.test(t)) add('Phrasal verbs','Muito naturais em inglês de trabalho. Aprenda como chunks, não palavra por palavra.','I will follow up after the meeting.');return hits;}
  function estimateLevel(sents, ws, chunks){const avg=sents.length?ws.length/sents.length:0;let score=0;if(avg>12)score++;if(avg>18)score++;if(chunks.length>5)score++;if(/interpretability|robustness|governance|overwhelming|interoperability|preparedness|optimization|consensus/i.test((sents.join(' '))))score+=2;return ['A2','B1','B2','C1','C2'][Math.min(4,score)]||'B1';}
  function goalByType(type){return {email:'entender objetivo, responder com clareza e extrair frases profissionais.',music:'dividir em linhas, treinar ritmo, emoção, pronúncia e shadowing.',meeting:'extrair decisões, riscos, action items e linguagem de follow-up.',article:'separar ideias principais, vocabulário e gramática avançada.',writing:'corrigir clareza, gramática, naturalidade e tom profissional.'}[type]||'estudar vocabulário, gramática e pronúncia.';}
  window.analyzeTextLab=function(){
    const text=$('tlText').value||''; const type=$('tlType').value; const target=$('tlLevel').value; if(!text.trim()){toast('Cole um texto primeiro.');return;} localStorage.setItem('fluencyos_textlab_text',text);
    const sents=sentences(text); const ws=words(text); const tops=uniqTop(ws,32); const chunks=detectChunks(text); const vocab=detectVocab(tops); const grammar=detectGrammar(text); const est=estimateLevel(sents,ws,chunks); const avg=sents.length?Math.round(ws.length/sents.length):0;
    const selected=sents.slice(0,14);
    $('tlOutput').innerHTML=`<div class="analysis-grid"><div class="analysis-stat"><b>${ws.length}</b><span>palavras</span></div><div class="analysis-stat"><b>${sents.length}</b><span>frases/linhas</span></div><div class="analysis-stat"><b>${avg}</b><span>média palavras/frase</span></div><div class="analysis-stat"><b>${est}</b><span>nível estimado</span></div></div><div class="text-map"><h3>Mapa visual do texto</h3><div class="text-map-grid"><div class="text-map-node"><b>Tipo</b><span>${h($('tlType').selectedOptions[0].text)}</span></div><div class="text-map-node"><b>Objetivo</b><span>${h(goalByType(type))}</span></div><div class="text-map-node"><b>Foco</b><span>palavras + chunks + gramática + pronúncia + resposta</span></div><div class="text-map-node"><b>Nível alvo</b><span>${h(target)}: adaptar vocabulário e tamanho das respostas.</span></div><div class="text-map-node"><b>Próximo passo</b><span>copiar prompt para IA ou treinar as frases abaixo.</span></div></div></div><div class="lab-tabs"><button class="active" onclick="tlShow('sentences')">Frases</button><button onclick="tlShow('vocab')">Palavras</button><button onclick="tlShow('chunks')">Chunks</button><button onclick="tlShow('grammar')">Gramática</button><button onclick="tlShow('writing')">Escrita/IA</button></div><div id="tlPanel" class="textlab-results"></div>`;

  };
  function localTips(text){const tips=[];if(/difficulty to/i.test(text))tips.push(['difficulty to','Use difficulty + verb-ing: I have difficulty speaking.']);if(/responsible to/i.test(text))tips.push(['responsible to','Para responsabilidade por algo, use responsible for.']);if(/explain me/i.test(text))tips.push(['explain me','O natural é explain it to me.']);if(/depends of/i.test(text))tips.push(['depends of','O correto é depends on.']);if(/discuss about/i.test(text))tips.push(['discuss about','Use discuss + objeto: discuss the topic.']);return tips.length?`<div class="correction-list">${tips.map(t=>`<div class="correction-item"><b>${h(t[0])}</b><p class="muted">${h(t[1])}</p></div>`).join('')}</div>`:'<p class="muted">Não encontrei erros comuns pela checagem local. Para correção completa, use o prompt de IA.</p>';}
  function buildPrompt(d){return `Quero estudar este texto em inglês para melhorar fluência, leitura, escrita e pronúncia. Meu nível alvo é ${d.target}. Tipo de texto: ${d.type}.

  const chunkDict=[['cost optimization','otimização de custos'],['maximize value','maximizar valor'],['directly from the IDE','diretamente da IDE'],['real usage patterns','padrões reais de uso'],['hands-on techniques','técnicas práticas'],['better prompting','prompts melhores'],['context management','gestão de contexto'],['unnecessary consumption','consumo desnecessário'],['day-to-day efficiency','eficiência no dia a dia'],['additional optimization levers','alavancas adicionais de otimização'],['climate-related emergencies','emergências relacionadas ao clima'],['more frequent and more severe','mais frequentes e mais severas'],['overwhelming scientific consensus','consenso científico muito forte'],['human-driven climate change','mudança climática causada pela ação humana'],['extreme weather events','eventos climáticos extremos'],['emergency preparedness','preparação para emergências'],['affected communities','comunidades afetadas'],['frontline disaster response','resposta a desastres na linha de frente'],['global town hall','reunião global da empresa'],['model robustness','robustez de modelos'],['generative AI','IA generativa'],['open-source solutions','soluções open-source'],['status update','atualização de status'],['next steps','próximos passos'],['action items','itens de ação'],['follow up','acompanhar/cobrar retorno'],['wrap up','encerrar/resumir'],['reach out','entrar em contato'],['look into','investigar'],['set up','configurar/agendar']];
  function keyWords(text){const words=(String(text||'').toLowerCase().match(/[a-z][a-z'-]+/g)||[]).filter(w=>w.length>2&&!stop.has(w));const m={};words.forEach(w=>m[w]=(m[w]||0)+1);return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,36)}
  function localTranslateParagraph(p){
    let out=''; let low=' '+p.toLowerCase()+' ';
    const found=chunkDict.filter(([en])=>low.includes(en));
    if(found.length){out+='Ideias principais: '+found.map(x=>x[1]).join('; ')+'. ';}
    const keys=keyWords(p).slice(0,12).map(([w])=>miniDict[w]).filter(Boolean);
    if(keys.length){out+='Palavras-chave: '+[...new Set(keys)].join(', ')+'. ';}
    if(!out) out='Tradução local limitada: use o botão “Copiar prompt de tradução” para uma tradução completa com IA.';
    return out;
  }
  function simpleLevel(text){const wc=wordCount(text);const avg=sentences(text).length?Math.round(wc/sentences(text).length):0;let s=0;if(avg>10)s++;if(avg>16)s++;if(wc>120)s++;if(/interpretability|robustness|governance|interoperability|overwhelming|preparedness|optimization|consensus/i.test(text))s+=2;return ['A2','B1','B2','C1','C2'][Math.min(4,s)]}
  window.textlab=function(){
    const saved=localStorage.getItem('fluencyos_textlab_text')||'';
    const doubts=JSON.parse(localStorage.getItem('fluencyos_textlab_doubts')||'[]');
    $('view').innerHTML=`<div class="simple-lab"><div class="simple-panel"><div class="textlab-section-title"><div><h3>1. Cole o texto grande aqui</h3><p>Pode colar e-mail, comunicado, letra para estudo pessoal, texto longo ou mensagem que você precisa entender. Aceita mais de 5.000 caracteres.</p></div><span class="pill">Text Lab simples</span></div><textarea id="tlText" class="simple-textarea big" placeholder="Cole aqui um texto grande em inglês...">${h(saved)}</textarea><div class="counter-row"><span id="tlCounter">0 caracteres • 0 palavras</span><span>O texto fica salvo apenas no seu navegador quando você clicar em Salvar.</span></div><div class="hero-actions"><button class="btn primary" onclick="translateTextLab()">Traduzir</button><button class="btn" onclick="saveTextLabSimple()">Salvar texto</button><button class="btn" onclick="copyTranslationPrompt()">Copiar prompt de tradução completa</button><button class="btn danger" onclick="clearTextLabSimple()">Limpar</button></div><div class="simplify-note"><b>Nota:</b> como esta versão está no GitHub Pages, a tradução automática completa por IA precisa de backend seguro. Aqui deixei uma tradução local guiada por chunks/palavras e um prompt pronto para trazer para o ChatGPT.</div></div><div id="tlOutput"></div><div class="simple-panel"><div class="textlab-section-title"><div><h3>2. Frases, palavras ou trechos que deram dúvida</h3><p>Digite uma frase por linha. O app cria bloco de estudo com pronúncia aproximada, áudio lento/normal e espaço para praticar.</p></div></div><textarea id="tlDoubtInput" class="simple-textarea" placeholder="Exemplo:\nCould you give us a quick status update?\ncontext management\nmodel robustness"></textarea><div class="hero-actions"><button class="btn good" onclick="addTextLabDoubts()">Criar bloco de estudo</button><button class="btn" onclick="clearTextLabDoubts()">Limpar dúvidas salvas</button></div><div id="tlDoubts" class="doubt-list">${renderDoubtCards(doubts)}</div></div></div>`;
    updateTextCounter(); $('tlText').addEventListener('input',updateTextCounter);
  };
  function updateTextCounter(){const t=$('tlText'); if(!t)return; const text=t.value||''; $('tlCounter').textContent=`${text.length.toLocaleString('pt-BR')} caracteres • ${wordCount(text).toLocaleString('pt-BR')} palavras • nível estimado ${simpleLevel(text)}`;}
  window.saveTextLabSimple=function(){localStorage.setItem('fluencyos_textlab_text',$('tlText').value||'');toast('Texto salvo localmente.');}
  window.clearTextLabSimple=function(){localStorage.removeItem('fluencyos_textlab_text');$('tlText').value='';$('tlOutput').innerHTML='';updateTextCounter();toast('Texto limpo.');}
  window.translateTextLab=function(){const text=$('tlText').value||''; if(!text.trim()){toast('Cole um texto primeiro.');return;} localStorage.setItem('fluencyos_textlab_text',text); const ps=paragraphs(text); const sents=sentences(text); const kws=keyWords(text); const chunks=chunkDict.filter(([en])=>text.toLowerCase().includes(en)); const level=simpleLevel(text); $('tlOutput').innerHTML=`<div class="simple-panel"><div class="textlab-section-title"><div><h3>Resultado da tradução e entendimento</h3><p>Tradução local guiada por chunks + palavras-chave. Para uma tradução fiel por parágrafos, use o botão de prompt.</p></div><span class="pill">${wordCount(text)} palavras • ${level}</span></div><div class="quick-analysis"><div class="quick-stat"><b>${text.length}</b><span>caracteres</span></div><div class="quick-stat"><b>${wordCount(text)}</b><span>palavras</span></div><div class="quick-stat"><b>${sents.length}</b><span>frases/linhas</span></div><div class="quick-stat"><b>${level}</b><span>nível estimado</span></div></div><div class="translate-output"><div class="translation-card"><h4>Original por blocos</h4>${ps.slice(0,12).map((p,i)=>`<div class="paragraph-row"><div class="original">${i+1}. ${h(p)}</div></div>`).join('')}</div><div class="translation-card"><h4>Entendimento em português</h4>${ps.slice(0,12).map((p,i)=>`<div class="paragraph-row"><div class="translated">${i+1}. ${h(localTranslateParagraph(p))}</div></div>`).join('')}</div></div><h3 style="margin-top:16px">Palavras e chunks importantes</h3><div class="lab-word-grid">${[...chunks.map(c=>[c[0],c[1],'chunk']),...kws.slice(0,18).map(([w,c])=>[w,miniDict[w]||'buscar tradução/uso com IA',c+'x'])].slice(0,24).map(x=>`<div class="lab-word"><b>${h(x[0])}</b><small>${h(x[2])}</small><p class="pt">${h(x[1])}</p><span class="cue-mini" style="display:block">${h(window.phoneticApprox?window.phoneticApprox(x[0]):x[0])}</span></div>`).join('')}</div><div class="hero-actions"><button class="btn primary" onclick="copyTranslationPrompt()">Copiar prompt para tradução fiel</button><button class="btn" onclick="makeTextLabStudyFromText()">Gerar frases para praticar</button></div><div id="tlStudyRows"></div></div>`;}
  window.copyTranslationPrompt=function(){const text=$('tlText')?.value||''; if(!text.trim()){toast('Cole um texto primeiro.');return;} const prompt=`Traduza e explique este texto em inglês para mim em português. Quero uma explicação objetiva para aprender inglês. Faça:\n1. tradução natural por parágrafos;\n2. palavras importantes com tradução e exemplo;\n3. chunks/expressões naturais;\n4. gramática usada;\n5. pronúncia aproximada das frases principais no estilo brasileiro, exemplo: I need help with this task → ai nid help uíth dhis tásk;\n6. 10 frases para praticar speaking;\n7. se for e-mail, sugira uma resposta profissional.\n\nTexto:\n${text}`; navigator.clipboard.writeText(prompt).then(()=>toast('Prompt copiado. Cole no ChatGPT para tradução completa.'));}
  window.makeTextLabStudyFromText=function(){const text=$('tlText').value||''; const arr=sentences(text).slice(0,10); $('tlStudyRows').innerHTML='<h3 style="margin-top:16px">Frases para praticar</h3>'+arr.map(s=>studyCard(s)).join('');}
  function studyCard(s){return `<div class="doubt-card"><div class="en">${h(s)}</div><div class="line-pron">${h(window.phoneticApprox?window.phoneticApprox(s):s)}</div><div class="doubt-actions"><button class="btn" onclick="safeSpeak('${esc(s)}',.68,true)">🐢 Lento</button><button class="btn primary" onclick="safeSpeak('${esc(s)}',1,true)">▶️ Normal</button><button class="btn" onclick="practicePhrase('${esc(s)}','')">🎤 Gravar</button></div></div>`}
  function renderDoubtCards(items){return items.length?items.map(studyCard).join(''):'<div class="card"><p class="muted">Nenhuma dúvida salva ainda. Digite frases, palavras ou trechos acima.</p></div>'}
  window.addTextLabDoubts=function(){const raw=$('tlDoubtInput').value||''; const lines=raw.split(/\n+/).map(s=>s.trim()).filter(Boolean); if(!lines.length){toast('Digite pelo menos uma frase ou palavra.');return;} const old=JSON.parse(localStorage.getItem('fluencyos_textlab_doubts')||'[]'); const merged=[...lines,...old].slice(0,80); localStorage.setItem('fluencyos_textlab_doubts',JSON.stringify(merged)); $('tlDoubts').innerHTML=renderDoubtCards(merged); $('tlDoubtInput').value=''; toast('Bloco de estudo criado.');}
  window.clearTextLabDoubts=function(){localStorage.removeItem('fluencyos_textlab_doubts');$('tlDoubts').innerHTML=renderDoubtCards([]);toast('Dúvidas limpas.');}
  if(typeof nav==='function') nav();
  if(state&&state.route==='textlab') render();
})();
</script>
