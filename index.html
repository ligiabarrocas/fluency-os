<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FluencyOS — Inglês para Profissionais de TI</title>
<meta name="theme-color" content="#0b1020" />
<style>
:root{
  --bg:#080b16;--bg2:#0d1326;--panel:#101831;--panel2:#15203f;--line:rgba(255,255,255,.1);
  --text:#f7f8ff;--muted:#aab3d1;--soft:#dbe2ff;--accent:#8b5cf6;--accent2:#22d3ee;--good:#10b981;--warn:#f59e0b;--bad:#fb7185;
  --card-shadow: 0 20px 60px rgba(0,0,0,.35);--radius:24px;
}
*{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(139,92,246,.32),transparent 32%),radial-gradient(circle at 80% 12%,rgba(34,211,238,.18),transparent 30%),linear-gradient(180deg,var(--bg),#050712);color:var(--text);min-height:100vh}
button,input,select,textarea{font:inherit} button{cursor:pointer}
.app{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.sidebar{position:sticky;top:0;height:100vh;overflow:auto;padding:22px;border-right:1px solid var(--line);background:rgba(7,10,22,.72);backdrop-filter:blur(18px)}
.logo{display:flex;gap:12px;align-items:center;margin-bottom:24px}.mark{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;box-shadow:0 12px 30px rgba(139,92,246,.35);font-weight:900}.brand h1{font-size:20px;line-height:1;margin:0}.brand p{font-size:12px;color:var(--muted);margin:4px 0 0}.nav{display:grid;gap:8px}.nav button{border:0;background:transparent;color:var(--soft);text-align:left;border-radius:16px;padding:12px 14px;display:flex;gap:10px;align-items:center}.nav button:hover,.nav button.active{background:linear-gradient(90deg,rgba(139,92,246,.22),rgba(34,211,238,.08));color:white}.nav small{margin-left:auto;color:var(--muted)}
.main{padding:28px;max-width:1400px;width:100%;margin:0 auto}.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:20px;margin-bottom:22px}.hero-card,.card{background:linear-gradient(180deg,rgba(21,32,63,.82),rgba(13,19,38,.8));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:24px;position:relative;overflow:hidden}.hero-card:after{content:"";position:absolute;right:-50px;top:-50px;width:210px;height:210px;border-radius:60px;background:linear-gradient(135deg,rgba(139,92,246,.35),rgba(34,211,238,.18));transform:rotate(22deg)}
.kicker{display:inline-flex;gap:8px;align-items:center;color:#d8ccff;background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.34);padding:7px 11px;border-radius:999px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.hero h2{font-size:40px;line-height:1.03;margin:18px 0 12px;max-width:720px}.hero p{color:var(--muted);font-size:16px;line-height:1.6;max-width:780px}.hero-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.btn{border:1px solid var(--line);background:rgba(255,255,255,.06);color:white;border-radius:14px;padding:11px 14px;font-weight:750}.btn.primary{background:linear-gradient(135deg,var(--accent),#5b8cff);border:0}.btn.good{background:linear-gradient(135deg,var(--good),#22d3ee);border:0;color:#041016}.btn.warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:#ffd18a}.btn.danger{background:rgba(251,113,133,.13);border-color:rgba(251,113,133,.35);color:#ffc4cf}.btn:disabled{opacity:.45;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}.stat{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:20px;padding:16px}.stat b{font-size:24px}.stat span{display:block;color:var(--muted);font-size:13px;margin-top:5px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-7{grid-column:span 7}.col-8{grid-column:span 8}.col-12{grid-column:span 12}.section-title{display:flex;align-items:end;justify-content:space-between;margin:8px 0 14px}.section-title h3{font-size:24px;margin:0}.section-title p{color:var(--muted);margin:4px 0 0}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:rgba(255,255,255,.055);color:var(--muted);font-size:12px}.progress{height:10px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:.5s}.module-card{padding:18px;border-radius:22px;background:rgba(255,255,255,.055);border:1px solid var(--line);min-height:170px;display:flex;flex-direction:column;gap:12px}.module-card h4{margin:0;font-size:18px}.module-card p{color:var(--muted);line-height:1.45;margin:0}.icon{font-size:30px}.tag{display:inline-block;font-size:11px;color:#bdefff;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.25);padding:5px 8px;border-radius:999px;margin:2px}.hidden{display:none!important}.search{width:100%;padding:13px 14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:white;margin-bottom:14px}.table{width:100%;border-collapse:separate;border-spacing:0 8px}.table th{text-align:left;color:var(--muted);font-size:12px;padding:0 10px}.table td{background:rgba(255,255,255,.055);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:12px 10px;vertical-align:top}.table td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.table td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.en{font-weight:800;color:white}.pt{color:#cbd5ff}.muted{color:var(--muted)}.mini{font-size:12px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--soft);border-radius:999px;padding:8px 12px}.tab.active{background:linear-gradient(135deg,var(--accent),#357eff);color:white;border:0}.lesson{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;padding:18px;margin-bottom:12px}.lesson h4{margin:0 0 8px}.lesson p{color:var(--muted);line-height:1.55}.quote{border-left:3px solid var(--accent2);padding-left:13px;margin:12px 0;color:#e7ecff}.coach-box{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.22);border-radius:18px;padding:16px}.mindmap{min-height:620px;position:relative;border-radius:28px;background:radial-gradient(circle at center,rgba(139,92,246,.22),transparent 28%),rgba(255,255,255,.04);border:1px solid var(--line);overflow:hidden}.node{position:absolute;transform:translate(-50%,-50%);border:1px solid var(--line);background:linear-gradient(180deg,rgba(21,32,63,.95),rgba(9,14,30,.94));box-shadow:0 12px 34px rgba(0,0,0,.35);padding:14px;border-radius:20px;min-width:145px;text-align:center;transition:.2s}.node:hover{scale:1.04;border-color:rgba(34,211,238,.5)}.node.core{min-width:180px;padding:20px;background:linear-gradient(135deg,rgba(139,92,246,.95),rgba(34,211,238,.7));color:white}.node b{display:block}.node span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.node.core span{color:#eef}.line{position:absolute;height:2px;background:linear-gradient(90deg,rgba(139,92,246,.1),rgba(34,211,238,.55),rgba(139,92,246,.1));transform-origin:left center}.timeline{display:grid;gap:10px}.day{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:18px;padding:12px}.check{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);display:grid;place-items:center}.day.done .check{background:linear-gradient(135deg,var(--good),var(--accent2));color:#02130d}.flashcard{min-height:270px;display:grid;place-items:center;text-align:center;border-radius:26px;background:linear-gradient(135deg,rgba(139,92,246,.24),rgba(34,211,238,.10));border:1px solid var(--line);padding:24px}.flashcard .big{font-size:30px;font-weight:900}.flashcard .sub{color:var(--muted);margin-top:12px}.infographic{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.step{position:relative;min-height:120px;padding:15px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.055)}.step .num{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-weight:900;margin-bottom:10px}.svg-wrap{width:100%;overflow:auto;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:14px}.audio-panel{background:linear-gradient(135deg,rgba(245,158,11,.14),rgba(34,211,238,.08));border:1px solid rgba(245,158,11,.28);border-radius:22px;padding:18px}.voice-list{width:100%;padding:12px;border-radius:14px;background:#0b1020;color:white;border:1px solid var(--line)}.recorder{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111936;border:1px solid var(--line);box-shadow:var(--card-shadow);padding:12px 16px;border-radius:16px;color:white;z-index:99;max-width:90%;display:none}.toast.show{display:block}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);z-index:80;display:none;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}.modal-card{max-width:820px;width:100%;max-height:90vh;overflow:auto;background:#0d1326;border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:var(--card-shadow)}.modal-card h3{margin-top:0}.close{float:right}.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}.textarea{width:100%;min-height:130px;padding:14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:white}.score{font-size:42px;font-weight:900;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;color:transparent}.mobile-top{display:none;padding:12px;background:rgba(7,10,22,.92);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:70}.hamb{border:1px solid var(--line);background:rgba(255,255,255,.06);color:white;border-radius:12px;padding:10px}
@media(max-width:980px){.app{display:block}.mobile-top{display:flex;justify-content:space-between;align-items:center}.sidebar{position:fixed;left:-310px;z-index:90;transition:.25s}.sidebar.open{left:0}.main{padding:18px}.hero,.music-hero{grid-template-columns:1fr}.hero h2{font-size:31px}.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.col-4,.col-5,.col-6,.col-7,.col-8,.col-12{grid-column:span 1}.infographic{grid-template-columns:1fr 1fr}.album-grid{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}.mindmap{min-height:760px}.day{grid-template-columns:52px 1fr}.day .btn{grid-column:2}.table{font-size:13px}.table th:nth-child(3),.table td:nth-child(3){display:none}}
@media(max-width:560px){.stats{grid-template-columns:1fr}.infographic,.album-grid{grid-template-columns:1fr}.hero-card,.card{padding:18px}.node{min-width:120px;padding:11px;font-size:13px}.mindmap{min-height:860px}.table th:nth-child(2),.table td:nth-child(2){display:none}}

/* v0.6 additions */
.node{color:#ffffff!important}.node span{color:#e6ecff!important}.node b{color:#ffffff!important;text-shadow:0 1px 8px rgba(0,0,0,.35)}
.node.alt{background:linear-gradient(135deg,rgba(14,165,233,.88),rgba(59,130,246,.72))}.node.green{background:linear-gradient(135deg,rgba(16,185,129,.88),rgba(34,197,94,.68))}.node.gold{background:linear-gradient(135deg,rgba(245,158,11,.88),rgba(251,191,36,.65));color:#111!important}.node.gold b,.node.gold span{color:#111827!important;text-shadow:none}.node.pink{background:linear-gradient(135deg,rgba(236,72,153,.86),rgba(139,92,246,.76))}.node.darknode{background:linear-gradient(135deg,rgba(15,23,42,.98),rgba(51,65,85,.96))}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}.level-card{border:1px solid var(--line);border-radius:22px;padding:16px;background:rgba(255,255,255,.055);cursor:pointer}.level-card.active{outline:2px solid var(--accent2);background:linear-gradient(135deg,rgba(34,211,238,.14),rgba(139,92,246,.15))}.level-card b{display:block;font-size:16px}.level-card p{color:var(--muted);font-size:13px;line-height:1.45}.roadmap{display:grid;gap:12px}.road{display:grid;grid-template-columns:120px 1fr 120px;gap:12px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:22px;padding:14px}.road .badge{font-size:22px;font-weight:900}.phonetic{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);border-radius:14px;padding:10px;color:#d1fae5;margin-top:8px}.diagram{border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.04);padding:16px;overflow:auto}.flowchart{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:12px}.flowbox{min-height:130px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.035));padding:14px}.flowbox h4{margin:0 0 8px}.term-card{border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:20px;padding:16px;min-height:190px}.term-card h4{margin:8px 0}.role-card{border:1px solid var(--line);background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(34,211,238,.07));border-radius:20px;padding:16px}.cue{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#d1fae5;background:rgba(16,185,129,.1);border:1px dashed rgba(16,185,129,.35);border-radius:12px;padding:8px;display:block;margin-top:8px}.warn-note{border:1px solid rgba(245,158,11,.32);background:rgba(245,158,11,.09);border-radius:18px;padding:14px;color:#fff7ed}.compact-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.compact-item{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.045)}
@media(max-width:980px){.level-grid{grid-template-columns:1fr}.road{grid-template-columns:1fr}.flowchart{grid-template-columns:1fr}.compact-list{grid-template-columns:1fr}}

</style>
</head>

<script>
const DATA = {"verbs":[{"base":"be","past":"was/were","participle":"been","ing":"being","pt":"ser/estar","example":"I am responsible for the delivery plan.","translation":"Eu sou responsável pelo plano de entrega."},{"base":"have","past":"had","participle":"had","ing":"having","pt":"ter","example":"We have a dependency with the security team.","translation":"Temos uma dependência com o time de segurança."},{"base":"do","past":"did","participle":"done","ing":"doing","pt":"fazer","example":"Can you do a quick review before the meeting?","translation":"Você pode fazer uma revisão rápida antes da reunião?"},{"base":"get","past":"got","participle":"gotten/got","ing":"getting","pt":"obter/ficar/chegar","example":"I need to get more context before deciding.","translation":"Preciso obter mais contexto antes de decidir."},{"base":"make","past":"made","participle":"made","ing":"making","pt":"fazer/criar","example":"Let's make the decision today.","translation":"Vamos tomar a decisão hoje."},{"base":"go","past":"went","participle":"gone","ing":"going","pt":"ir","example":"The deployment went well.","translation":"O deploy correu bem."},{"base":"take","past":"took","participle":"taken","ing":"taking","pt":"pegar/levar/tomar","example":"This task may take two days.","translation":"Esta tarefa pode levar dois dias."},{"base":"come","past":"came","participle":"come","ing":"coming","pt":"vir","example":"The issue came from a configuration change.","translation":"O problema veio de uma mudança de configuração."},{"base":"give","past":"gave","participle":"given","ing":"giving","pt":"dar","example":"Could you give us a quick status update?","translation":"Você poderia nos dar uma atualização rápida do status?"},{"base":"put","past":"put","participle":"put","ing":"putting","pt":"colocar","example":"Let's put this risk in the report.","translation":"Vamos colocar esse risco no relatório."},{"base":"think","past":"thought","participle":"thought","ing":"thinking","pt":"pensar/achar","example":"I think we need to align with the stakeholders.","translation":"Acho que precisamos alinhar com os stakeholders."},{"base":"know","past":"knew","participle":"known","ing":"knowing","pt":"saber/conhecer","example":"Do you know who owns this task?","translation":"Você sabe quem é responsável por essa tarefa?"},{"base":"see","past":"saw","participle":"seen","ing":"seeing","pt":"ver/entender","example":"I see your point, but we need more data.","translation":"Entendo seu ponto, mas precisamos de mais dados."},{"base":"use","past":"used","participle":"used","ing":"using","pt":"usar","example":"We use Jira to track the backlog.","translation":"Usamos o Jira para acompanhar o backlog."},{"base":"work","past":"worked","participle":"worked","ing":"working","pt":"trabalhar/funcionar","example":"The workaround worked for now.","translation":"A solução temporária funcionou por enquanto."},{"base":"need","past":"needed","participle":"needed","ing":"needing","pt":"precisar","example":"We need to reduce the scope for this sprint.","translation":"Precisamos reduzir o escopo desta sprint."},{"base":"want","past":"wanted","participle":"wanted","ing":"wanting","pt":"querer","example":"I want to make sure we are aligned.","translation":"Quero garantir que estamos alinhados."},{"base":"mean","past":"meant","participle":"meant","ing":"meaning","pt":"significar/querer dizer","example":"What does this error message mean?","translation":"O que essa mensagem de erro significa?"},{"base":"try","past":"tried","participle":"tried","ing":"trying","pt":"tentar","example":"We tried to reproduce the issue.","translation":"Tentamos reproduzir o problema."},{"base":"ask","past":"asked","participle":"asked","ing":"asking","pt":"perguntar/pedir","example":"I will ask the vendor for an update.","translation":"Vou pedir uma atualização ao fornecedor."},{"base":"tell","past":"told","participle":"told","ing":"telling","pt":"dizer/contar","example":"Please tell me if anything changes.","translation":"Por favor, me avise se algo mudar."},{"base":"call","past":"called","participle":"called","ing":"calling","pt":"ligar/chamar","example":"Let's call out the main blocker.","translation":"Vamos destacar o principal bloqueio."},{"base":"find","past":"found","participle":"found","ing":"finding","pt":"encontrar","example":"We found the root cause.","translation":"Encontramos a causa raiz."},{"base":"help","past":"helped","participle":"helped","ing":"helping","pt":"ajudar","example":"This dashboard helps us track progress.","translation":"Esse dashboard nos ajuda a acompanhar o progresso."},{"base":"start","past":"started","participle":"started","ing":"starting","pt":"começar","example":"We started the migration last week.","translation":"Começamos a migração na semana passada."},{"base":"finish","past":"finished","participle":"finished","ing":"finishing","pt":"terminar","example":"We need to finish the testing phase by Friday.","translation":"Precisamos terminar a fase de testes até sexta-feira."},{"base":"update","past":"updated","participle":"updated","ing":"updating","pt":"atualizar","example":"I updated the project timeline.","translation":"Atualizei o cronograma do projeto."},{"base":"follow up","past":"followed up","participle":"followed up","ing":"following up","pt":"acompanhar/cobrar retorno","example":"I will follow up with the infrastructure team.","translation":"Vou acompanhar/cobrar retorno do time de infraestrutura."},{"base":"handle","past":"handled","participle":"handled","ing":"handling","pt":"lidar com","example":"How should we handle this escalation?","translation":"Como devemos lidar com essa escalação?"},{"base":"manage","past":"managed","participle":"managed","ing":"managing","pt":"gerenciar","example":"She manages cross-functional projects.","translation":"Ela gerencia projetos multifuncionais."},{"base":"improve","past":"improved","participle":"improved","ing":"improving","pt":"melhorar","example":"We need to improve the onboarding process.","translation":"Precisamos melhorar o processo de onboarding."},{"base":"fix","past":"fixed","participle":"fixed","ing":"fixing","pt":"corrigir/consertar","example":"The team fixed the bug in production.","translation":"O time corrigiu o bug em produção."},{"base":"deploy","past":"deployed","participle":"deployed","ing":"deploying","pt":"implantar/deployar","example":"We deployed the new version yesterday.","translation":"Implantamos a nova versão ontem."},{"base":"review","past":"reviewed","participle":"reviewed","ing":"reviewing","pt":"revisar","example":"Let's review the action items.","translation":"Vamos revisar os itens de ação."},{"base":"align","past":"aligned","participle":"aligned","ing":"aligning","pt":"alinhar","example":"We need to align expectations with the client.","translation":"Precisamos alinhar expectativas com o cliente."},{"base":"confirm","past":"confirmed","participle":"confirmed","ing":"confirming","pt":"confirmar","example":"Can you confirm the deadline?","translation":"Você pode confirmar o prazo?"},{"base":"clarify","past":"clarified","participle":"clarified","ing":"clarifying","pt":"esclarecer","example":"Let me clarify the requirement.","translation":"Deixe-me esclarecer o requisito."},{"base":"estimate","past":"estimated","participle":"estimated","ing":"estimating","pt":"estimar","example":"The team estimated the effort at three days.","translation":"O time estimou o esforço em três dias."},{"base":"prioritize","past":"prioritized","participle":"prioritized","ing":"prioritizing","pt":"priorizar","example":"We need to prioritize the critical defects.","translation":"Precisamos priorizar os defeitos críticos."},{"base":"schedule","past":"scheduled","participle":"scheduled","ing":"scheduling","pt":"agendar/programar","example":"I scheduled a meeting with the stakeholders.","translation":"Agendei uma reunião com os stakeholders."},{"base":"raise","past":"raised","participle":"raised","ing":"raising","pt":"levantar/sinalizar","example":"I raised a risk during the meeting.","translation":"Sinalizei um risco durante a reunião."},{"base":"resolve","past":"resolved","participle":"resolved","ing":"resolving","pt":"resolver","example":"We resolved the incident this morning.","translation":"Resolvemos o incidente esta manhã."},{"base":"escalate","past":"escalated","participle":"escalated","ing":"escalating","pt":"escalar","example":"We may need to escalate this to leadership.","translation":"Talvez precisemos escalar isso para a liderança."},{"base":"monitor","past":"monitored","participle":"monitored","ing":"monitoring","pt":"monitorar","example":"We are monitoring the system after the release.","translation":"Estamos monitorando o sistema após a release."},{"base":"track","past":"tracked","participle":"tracked","ing":"tracking","pt":"acompanhar","example":"We track risks in a shared document.","translation":"Acompanhamos riscos em um documento compartilhado."},{"base":"deliver","past":"delivered","participle":"delivered","ing":"delivering","pt":"entregar","example":"The team delivered the MVP on time.","translation":"O time entregou o MVP no prazo."},{"base":"delay","past":"delayed","participle":"delayed","ing":"delaying","pt":"atrasar","example":"The integration delayed the release.","translation":"A integração atrasou a release."},{"base":"approve","past":"approved","participle":"approved","ing":"approving","pt":"aprovar","example":"The client approved the change request.","translation":"O cliente aprovou a solicitação de mudança."},{"base":"reject","past":"rejected","participle":"rejected","ing":"rejecting","pt":"rejeitar","example":"The API rejected the request.","translation":"A API rejeitou a solicitação."},{"base":"support","past":"supported","participle":"supported","ing":"supporting","pt":"apoiar/dar suporte","example":"The vendor is supporting the migration.","translation":"O fornecedor está apoiando a migração."},{"base":"require","past":"required","participle":"required","ing":"requiring","pt":"exigir/requerer","example":"This feature requires additional testing.","translation":"Este recurso requer testes adicionais."},{"base":"depend on","past":"depended on","participle":"depended on","ing":"depending on","pt":"depender de","example":"The timeline depends on the vendor response.","translation":"O cronograma depende da resposta do fornecedor."},{"base":"break","past":"broke","participle":"broken","ing":"breaking","pt":"quebrar/parar","example":"The change broke the authentication flow.","translation":"A mudança quebrou o fluxo de autenticação."},{"base":"build","past":"built","participle":"built","ing":"building","pt":"construir","example":"We built a new reporting dashboard.","translation":"Construímos um novo dashboard de relatórios."},{"base":"run","past":"ran","participle":"run","ing":"running","pt":"rodar/executar","example":"The pipeline is running now.","translation":"A pipeline está rodando agora."},{"base":"set up","past":"set up","participle":"set up","ing":"setting up","pt":"configurar","example":"We set up the test environment.","translation":"Configuramos o ambiente de testes."},{"base":"log in","past":"logged in","participle":"logged in","ing":"logging in","pt":"entrar no sistema","example":"I can't log in to the portal.","translation":"Não consigo entrar no portal."},{"base":"sign off","past":"signed off","participle":"signed off","ing":"signing off","pt":"dar aceite/aprovar formalmente","example":"The sponsor signed off on the scope.","translation":"O sponsor deu aceite no escopo."},{"base":"roll back","past":"rolled back","participle":"rolled back","ing":"rolling back","pt":"reverter","example":"We rolled back the deployment.","translation":"Revertemos o deploy."},{"base":"bring up","past":"brought up","participle":"brought up","ing":"bringing up","pt":"trazer à tona","example":"She brought up an important concern.","translation":"Ela trouxe uma preocupação importante."},{"base":"analyze","past":"analyzed","participle":"analyzed","ing":"analyzing","pt":"analisar","example":"We analyzed the incident and found a missing validation.","translation":"Analisamos o incidente e encontramos uma validação ausente."},{"base":"design","past":"designed","participle":"designed","ing":"designing","pt":"desenhar/projetar","example":"The architect designed a more resilient integration flow.","translation":"O arquiteto desenhou um fluxo de integração mais resiliente."},{"base":"implement","past":"implemented","participle":"implemented","ing":"implementing","pt":"implementar","example":"The team implemented the new SDK in two services.","translation":"O time implementou o novo SDK em dois serviços."},{"base":"integrate","past":"integrated","participle":"integrated","ing":"integrating","pt":"integrar","example":"We need to integrate the catalog with the governance platform.","translation":"Precisamos integrar o catálogo com a plataforma de governança."},{"base":"validate","past":"validated","participle":"validated","ing":"validating","pt":"validar","example":"QA validated the fix before the release window.","translation":"O QA validou a correção antes da janela de release."},{"base":"automate","past":"automated","participle":"automated","ing":"automating","pt":"automatizar","example":"We automated the regression tests to reduce manual effort.","translation":"Automatizamos os testes de regressão para reduzir esforço manual."},{"base":"catalog","past":"cataloged","participle":"cataloged","ing":"cataloging","pt":"catalogar","example":"The data product must be cataloged before consumers can request access.","translation":"O produto de dados deve ser catalogado antes de consumidores pedirem acesso."},{"base":"govern","past":"governed","participle":"governed","ing":"governing","pt":"governar","example":"Sensitive data must be governed through clear access policies.","translation":"Dados sensíveis devem ser governados por políticas claras de acesso."},{"base":"observe","past":"observed","participle":"observed","ing":"observing","pt":"observar/monitorar","example":"We observed a spike in latency after the deployment.","translation":"Observamos um pico de latência depois do deploy."},{"base":"instrument","past":"instrumented","participle":"instrumented","ing":"instrumenting","pt":"instrumentar","example":"The team instrumented the service with traces and metrics.","translation":"O time instrumentou o serviço com traces e métricas."},{"base":"reproduce","past":"reproduced","participle":"reproduced","ing":"reproducing","pt":"reproduzir","example":"We could not reproduce the bug in the staging environment.","translation":"Não conseguimos reproduzir o bug no ambiente de staging."},{"base":"troubleshoot","past":"troubleshot","participle":"troubleshot","ing":"troubleshooting","pt":"investigar/resolver problema","example":"We are troubleshooting the interoperability issue with the vendor.","translation":"Estamos investigando o problema de interoperabilidade com o fornecedor."},{"base":"document","past":"documented","participle":"documented","ing":"documenting","pt":"documentar","example":"Please document the decision and the trade-offs.","translation":"Por favor, documente a decisão e os trade-offs."},{"base":"facilitate","past":"facilitated","participle":"facilitated","ing":"facilitating","pt":"facilitar/conduzir","example":"I will facilitate the retrospective and capture the action items.","translation":"Vou conduzir a retrospectiva e registrar os itens de ação."},{"base":"mentor","past":"mentored","participle":"mentored","ing":"mentoring","pt":"mentorar","example":"Senior engineers mentor less experienced team members.","translation":"Engenheiros sêniores mentoram pessoas menos experientes do time."},{"base":"challenge","past":"challenged","participle":"challenged","ing":"challenging","pt":"questionar/desafiar","example":"It is healthy to challenge assumptions respectfully.","translation":"É saudável questionar premissas com respeito."},{"base":"include","past":"included","participle":"included","ing":"including","pt":"incluir","example":"We need to include accessibility and diversity considerations in the product.","translation":"Precisamos incluir considerações de acessibilidade e diversidade no produto."},{"base":"assess","past":"assessed","participle":"assessed","ing":"assessing","pt":"avaliar","example":"We assessed the risk before changing the architecture.","translation":"Avaliamos o risco antes de mudar a arquitetura."}],"expressions":[{"category":"meetings","en":"Could you give us a quick status update?","pt":"Você poderia nos dar uma atualização rápida do status?","usage":"Use para pedir uma atualização objetiva."},{"category":"meetings","en":"Let me share my screen.","pt":"Deixe-me compartilhar minha tela.","usage":"Frase comum em calls."},{"category":"meetings","en":"I agree with the overall direction.","pt":"Eu concordo com a direção geral.","usage":"Concordância profissional, sem soar simples demais."},{"category":"meetings","en":"I see your point, but I have a concern.","pt":"Entendo seu ponto, mas tenho uma preocupação.","usage":"Discordar com educação."},{"category":"meetings","en":"Can we take this offline?","pt":"Podemos tratar isso separadamente?","usage":"Quando o tema não precisa travar a reunião."},{"category":"meetings","en":"Let's park this topic for now.","pt":"Vamos deixar esse assunto em pausa por enquanto.","usage":"Gerenciar pauta sem parecer rude."},{"category":"meetings","en":"What are the next steps?","pt":"Quais são os próximos passos?","usage":"Fechamento de reunião."},{"category":"meetings","en":"Who will own this action item?","pt":"Quem ficará responsável por esse item de ação?","usage":"Definição de responsabilidade."},{"category":"tech","en":"The issue is related to the authentication flow.","pt":"O problema está relacionado ao fluxo de autenticação.","usage":"Explicar causa técnica."},{"category":"tech","en":"We need to check the logs.","pt":"Precisamos verificar os logs.","usage":"Investigação técnica."},{"category":"tech","en":"The API is returning a timeout error.","pt":"A API está retornando erro de timeout.","usage":"Problemas de integração."},{"category":"tech","en":"The deployment was successful.","pt":"O deploy foi bem-sucedido.","usage":"Comunicar release."},{"category":"tech","en":"We found the root cause.","pt":"Encontramos a causa raiz.","usage":"Incidente/problema resolvido."},{"category":"tech","en":"This is a temporary workaround.","pt":"Esta é uma solução temporária.","usage":"Quando ainda não há correção definitiva."},{"category":"pm","en":"The project is on track.","pt":"O projeto está dentro do planejado.","usage":"Status positivo."},{"category":"pm","en":"We are running behind schedule.","pt":"Estamos atrasados em relação ao cronograma.","usage":"Status de atraso."},{"category":"pm","en":"There is a dependency with the vendor.","pt":"Existe uma dependência com o fornecedor.","usage":"Mapear dependências."},{"category":"pm","en":"We need to manage the scope carefully.","pt":"Precisamos gerenciar o escopo com cuidado.","usage":"Controle de escopo."},{"category":"pm","en":"This may impact the timeline.","pt":"Isso pode impactar o cronograma.","usage":"Comunicar risco."},{"category":"pm","en":"I will escalate this risk to leadership.","pt":"Vou escalar esse risco para a liderança.","usage":"Governança."},{"category":"writing","en":"Please find below the project update.","pt":"Segue abaixo a atualização do projeto.","usage":"Abertura de e-mail profissional."},{"category":"writing","en":"Could you please confirm by Friday?","pt":"Você poderia confirmar até sexta-feira?","usage":"Pedido educado com prazo."},{"category":"writing","en":"Thank you for your support.","pt":"Obrigada pelo seu apoio.","usage":"Encerramento cordial."},{"category":"writing","en":"I would like to clarify one point.","pt":"Gostaria de esclarecer um ponto.","usage":"Mensagem objetiva."},{"category":"writing","en":"As discussed in our meeting,","pt":"Conforme discutido em nossa reunião,","usage":"Retomar alinhamentos."},{"category":"smalltalk","en":"How was your weekend?","pt":"Como foi seu fim de semana?","usage":"Small talk básico."},{"category":"smalltalk","en":"I’m still getting used to speaking English in meetings.","pt":"Ainda estou me acostumando a falar inglês em reuniões.","usage":"Frase honesta para destravar."},{"category":"smalltalk","en":"That sounds interesting.","pt":"Isso parece interessante.","usage":"Resposta natural."},{"category":"interview","en":"Could you tell me more about the role?","pt":"Você poderia me contar mais sobre a vaga?","usage":"Entrevista."},{"category":"interview","en":"I have experience managing technology projects.","pt":"Tenho experiência gerenciando projetos de tecnologia.","usage":"Apresentação profissional."},{"category":"interview","en":"My main strength is organizing complex initiatives.","pt":"Meu principal ponto forte é organizar iniciativas complexas.","usage":"Autoapresentação."},{"category":"business","en":"I want to make sure we are aligned.","pt":"Quero garantir que estamos alinhados.","usage":"Alinhamento."},{"category":"business","en":"Could you walk me through the process?","pt":"Você poderia me explicar o processo passo a passo?","usage":"Pedir explicação."},{"category":"business","en":"Let’s focus on the main priority.","pt":"Vamos focar na prioridade principal.","usage":"Foco."},{"category":"business","en":"This is a high-priority request.","pt":"Esta é uma solicitação de alta prioridade.","usage":"Priorização."},{"category":"business","en":"We need more visibility on this topic.","pt":"Precisamos de mais visibilidade sobre esse assunto.","usage":"Governança."},{"category":"business","en":"I’ll send a summary after the meeting.","pt":"Vou enviar um resumo após a reunião.","usage":"Follow-up."},{"category":"business","en":"Let’s define the decision criteria.","pt":"Vamos definir os critérios de decisão.","usage":"Decisão."},{"category":"business","en":"What is the expected outcome?","pt":"Qual é o resultado esperado?","usage":"Clareza."},{"category":"business","en":"I’m concerned about the deadline.","pt":"Estou preocupada com o prazo.","usage":"Risco."},{"category":"business","en":"Can we revisit this decision later?","pt":"Podemos revisar essa decisão mais tarde?","usage":"Negociação."},{"category":"tech","en":"The system is not behaving as expected.","pt":"O sistema não está se comportando como esperado.","usage":"Problema técnico."},{"category":"tech","en":"The data is not being updated.","pt":"Os dados não estão sendo atualizados.","usage":"Dados."},{"category":"tech","en":"The integration failed during testing.","pt":"A integração falhou durante os testes.","usage":"Integração."},{"category":"tech","en":"We need to validate the access permissions.","pt":"Precisamos validar as permissões de acesso.","usage":"Segurança."},{"category":"tech","en":"The environment is unstable.","pt":"O ambiente está instável.","usage":"Ambiente."},{"category":"tech","en":"The pipeline failed because of a configuration issue.","pt":"A pipeline falhou por causa de um problema de configuração.","usage":"CI/CD."},{"category":"tech","en":"We should document the rollback plan.","pt":"Devemos documentar o plano de rollback.","usage":"Release."},{"category":"pm","en":"The risk has a medium impact and high probability.","pt":"O risco tem impacto médio e alta probabilidade.","usage":"Gestão de riscos."},{"category":"pm","en":"We need a decision from the sponsor.","pt":"Precisamos de uma decisão do sponsor.","usage":"Governança."},{"category":"pm","en":"The scope changed after the initial estimate.","pt":"O escopo mudou após a estimativa inicial.","usage":"Mudança de escopo."},{"category":"pm","en":"Let’s split this into smaller milestones.","pt":"Vamos dividir isso em marcos menores.","usage":"Planejamento."},{"category":"pm","en":"The team is blocked by an external dependency.","pt":"O time está bloqueado por uma dependência externa.","usage":"Impedimento."},{"category":"pm","en":"We need to update the project roadmap.","pt":"Precisamos atualizar o roadmap do projeto.","usage":"Planejamento."},{"category":"pm","en":"This requires stakeholder approval.","pt":"Isso requer aprovação dos stakeholders.","usage":"Aprovação."},{"category":"writing","en":"I’m following up on the request below.","pt":"Estou acompanhando a solicitação abaixo.","usage":"Follow-up por e-mail."},{"category":"writing","en":"Please let me know if you have any questions.","pt":"Por favor, me avise se tiver qualquer dúvida.","usage":"Encerramento."},{"category":"writing","en":"Could you provide more details?","pt":"Você poderia fornecer mais detalhes?","usage":"Pedir contexto."},{"category":"writing","en":"Here is a quick recap of our discussion.","pt":"Aqui está um breve resumo da nossa discussão.","usage":"Resumo."},{"category":"writing","en":"The purpose of this email is to align on next steps.","pt":"O objetivo deste e-mail é alinhar os próximos passos.","usage":"E-mail objetivo."},{"category":"speaking","en":"Let me think for a second.","pt":"Deixe-me pensar por um segundo.","usage":"Ganhar tempo falando."},{"category":"speaking","en":"How can I say this in English?","pt":"Como posso dizer isso em inglês?","usage":"Quando travar."},{"category":"speaking","en":"I’ll rephrase that.","pt":"Vou reformular isso.","usage":"Autocorreção natural."},{"category":"speaking","en":"What I mean is...","pt":"O que quero dizer é...","usage":"Explicar melhor."},{"category":"speaking","en":"Sorry, I didn’t catch that.","pt":"Desculpe, não entendi isso.","usage":"Pedir repetição."},{"category":"speaking","en":"Could you say that again more slowly?","pt":"Você poderia dizer isso novamente mais devagar?","usage":"Listening em reunião."},{"category":"data","en":"Data product","pt":"Produto de dados","usage":"A reusable data asset with clear ownership, consumers, quality expectations, documentation, and support.","note":"Um ativo de dados reutilizável com ownership, consumidores, qualidade esperada, documentação e suporte."},{"category":"data","en":"Data catalog","pt":"Catálogo de dados","usage":"A place where people discover, understand, request access to, and trust data assets.","note":"Um lugar onde pessoas descobrem, entendem, pedem acesso e confiam em ativos de dados."},{"category":"data","en":"Data governance","pt":"Governança de dados","usage":"The set of policies, roles, controls, and practices that make data safe, compliant, and useful.","note":"Conjunto de políticas, papéis, controles e práticas que tornam dados seguros, conformes e úteis."},{"category":"data","en":"Data quality","pt":"Qualidade de dados","usage":"The data is complete, accurate, timely, consistent, and fit for the intended use.","note":"Os dados são completos, corretos, atualizados, consistentes e adequados ao uso pretendido."},{"category":"data","en":"Lineage","pt":"Linhagem","usage":"Lineage shows where data comes from, how it changes, and where it is used.","note":"Linhagem mostra de onde os dados vêm, como mudam e onde são usados."},{"category":"data","en":"Data mesh","pt":"Data mesh","usage":"A socio-technical approach where domains own data products supported by a self-service platform and federated governance.","note":"Abordagem sociotécnica em que domínios são donos de produtos de dados com plataforma self-service e governança federada."},{"category":"data","en":"Domain ownership","pt":"Ownership de domínio","usage":"The domain team is responsible for the meaning, quality, and lifecycle of its data products.","note":"O time de domínio é responsável pelo significado, qualidade e ciclo de vida dos produtos de dados."},{"category":"data","en":"Self-service platform","pt":"Plataforma self-service","usage":"A platform that allows teams to build, publish, monitor, and govern data products with less friction.","note":"Plataforma que permite aos times construir, publicar, monitorar e governar produtos de dados com menos fricção."},{"category":"ai","en":"Generative AI","pt":"IA generativa","usage":"Systems that generate text, code, images, summaries, or recommendations from prompts and context.","note":"Sistemas que geram texto, código, imagens, resumos ou recomendações a partir de prompts e contexto."},{"category":"ai","en":"Prompt engineering","pt":"Engenharia de prompt","usage":"The practice of designing instructions and context to get better AI outputs.","note":"A prática de desenhar instruções e contexto para obter melhores respostas da IA."},{"category":"ai","en":"Model evaluation","pt":"Avaliação de modelo","usage":"A structured way to test whether an AI model is accurate, safe, useful, and reliable.","note":"Forma estruturada de testar se um modelo de IA é preciso, seguro, útil e confiável."},{"category":"ai","en":"Hallucination","pt":"Alucinação","usage":"When an AI system produces an answer that sounds confident but is incorrect or unsupported.","note":"Quando um sistema de IA produz uma resposta convincente, mas incorreta ou sem suporte."},{"category":"tech","en":"SDK","pt":"SDK","usage":"A software development kit that helps developers integrate with a platform or service.","note":"Kit de desenvolvimento que ajuda devs a integrar com uma plataforma ou serviço."},{"category":"tech","en":"Interoperability","pt":"Interoperabilidade","usage":"The ability of systems, tools, and teams to work together through compatible interfaces and standards.","note":"Capacidade de sistemas, ferramentas e times trabalharem juntos por interfaces e padrões compatíveis."},{"category":"tech","en":"Observability","pt":"Observabilidade","usage":"The ability to understand system behavior through logs, metrics, traces, and events.","note":"Capacidade de entender o comportamento do sistema por logs, métricas, traces e eventos."},{"category":"tech","en":"Architecture decision record","pt":"Registro de decisão arquitetural","usage":"A short document that captures a decision, the context, alternatives, and consequences.","note":"Documento curto que registra uma decisão, contexto, alternativas e consequências."},{"category":"meetings","en":"Let me rephrase that.","pt":"Deixe-me reformular isso.","usage":"Use when you feel you were not clear and want to say it better.","note":"Use quando perceber que não foi clara e quer dizer melhor."},{"category":"meetings","en":"Could we park this topic and come back to it later?","pt":"Podemos deixar esse assunto em pausa e voltar nele depois?","usage":"Use to keep a meeting focused without ignoring a topic.","note":"Use para manter a reunião focada sem ignorar um assunto."},{"category":"meetings","en":"I want to make sure I understood correctly.","pt":"Quero garantir que entendi corretamente.","usage":"Use before summarizing what someone said.","note":"Use antes de resumir o que alguém disse."},{"category":"meetings","en":"What is the decision we need to make today?","pt":"Qual é a decisão que precisamos tomar hoje?","usage":"Use to move from discussion to decision.","note":"Use para sair da discussão e chegar à decisão."},{"category":"pm","en":"We are on track, but there is one dependency to watch.","pt":"Estamos no prazo, mas há uma dependência para acompanhar.","usage":"Useful for status reports with controlled risk.","note":"Útil para status reports com risco controlado."},{"category":"pm","en":"The main blocker is access approval from the security team.","pt":"O principal bloqueio é a aprovação de acesso do time de segurança.","usage":"Use in daily meetings and escalation conversations.","note":"Use em dailies e conversas de escalação."},{"category":"pm","en":"If we keep the same scope, we may need to adjust the timeline.","pt":"Se mantivermos o mesmo escopo, talvez precisemos ajustar o cronograma.","usage":"Use to negotiate scope, time, and quality.","note":"Use para negociar escopo, prazo e qualidade."},{"category":"pm","en":"My recommendation is to reduce scope rather than reduce testing.","pt":"Minha recomendação é reduzir escopo em vez de reduzir testes.","usage":"Use when defending quality and risk management.","note":"Use quando defender qualidade e gestão de risco."},{"category":"dei","en":"I want to make sure every voice is heard before we decide.","pt":"Quero garantir que todas as vozes sejam ouvidas antes de decidirmos.","usage":"Use in inclusive facilitation.","note":"Use em facilitação inclusiva."},{"category":"dei","en":"Could we create space for people who have not spoken yet?","pt":"Podemos abrir espaço para quem ainda não falou?","usage":"Use to promote equitable participation.","note":"Use para promover participação equitativa."},{"category":"dei","en":"Let us challenge the idea, not the person.","pt":"Vamos questionar a ideia, não a pessoa.","usage":"Use to keep conflict respectful.","note":"Use para manter conflitos respeitosos."},{"category":"career","en":"I am looking for opportunities where I can grow technically and contribute strategically.","pt":"Procuro oportunidades onde eu possa crescer tecnicamente e contribuir estrategicamente.","usage":"Useful for interviews and career conversations.","note":"Útil em entrevistas e conversas de carreira."},{"category":"career","en":"I have experience working with cross-functional teams across product, data, and engineering.","pt":"Tenho experiência trabalhando com times multifuncionais de produto, dados e engenharia.","usage":"Good for professional introductions.","note":"Bom para apresentações profissionais."}],"grammar":[{"title":"Simple Present","when":"Rotina, fatos, responsabilidades e processos.","formula":"Subject + verb / verb+s","example":"I manage technology projects.","pt":"Eu gerencio projetos de tecnologia.","mistake":"I am manage projects.","fix":"I manage projects.","tip":"Use para falar do que você faz no trabalho e de processos estáveis."},{"title":"Present Continuous","when":"Ações em andamento agora ou temporárias.","formula":"Subject + am/is/are + verb-ing","example":"We are testing the new release.","pt":"Estamos testando a nova versão.","mistake":"We testing the release.","fix":"We are testing the release.","tip":"Use em status updates quando algo está acontecendo no momento."},{"title":"Simple Past","when":"Ação finalizada no passado.","formula":"Subject + past verb","example":"We fixed the issue yesterday.","pt":"Corrigimos o problema ontem.","mistake":"We fix the issue yesterday.","fix":"We fixed the issue yesterday.","tip":"Palavras como yesterday, last week, in 2024 puxam Simple Past."},{"title":"Present Perfect","when":"Experiência, resultado atual ou algo que começou no passado e ainda importa.","formula":"Subject + have/has + past participle","example":"I have worked with agile teams for five years.","pt":"Trabalho com times ágeis há cinco anos.","mistake":"I work with agile teams for five years.","fix":"I have worked with agile teams for five years.","tip":"Use com for/since quando começou no passado e continua agora."},{"title":"Future with Will","when":"Decisão rápida, promessa, previsão.","formula":"Subject + will + base verb","example":"I will send the report after the meeting.","pt":"Vou enviar o relatório após a reunião.","mistake":"I will to send the report.","fix":"I will send the report.","tip":"Depois de will, o verbo fica sem to."},{"title":"Future with Going to","when":"Plano já pensado ou evidência clara.","formula":"Subject + am/is/are going to + verb","example":"We are going to migrate the system next month.","pt":"Vamos migrar o sistema no próximo mês.","mistake":"We going to migrate.","fix":"We are going to migrate.","tip":"Use para planos com mais intenção."},{"title":"Modal Verbs","when":"Poder, dever, possibilidade e recomendação.","formula":"can/could/should/must/may + base verb","example":"We should review the risks before the launch.","pt":"Devemos revisar os riscos antes do lançamento.","mistake":"We should to review.","fix":"We should review.","tip":"Depois de modal, não use to."},{"title":"First Conditional","when":"Condição real no futuro.","formula":"If + present, will + verb","example":"If the vendor delays, we will update the timeline.","pt":"Se o fornecedor atrasar, atualizaremos o cronograma.","mistake":"If the vendor will delay, we will update.","fix":"If the vendor delays, we will update.","tip":"Depois de if, normalmente use presente, não will."},{"title":"Second Conditional","when":"Hipótese, situação imaginária ou recomendação indireta.","formula":"If + past, would + verb","example":"If we had more time, we would test more scenarios.","pt":"Se tivéssemos mais tempo, testaríamos mais cenários.","mistake":"If we would have more time.","fix":"If we had more time.","tip":"Excelente para falar de restrições sem soar rude."},{"title":"Passive Voice","when":"Foco na ação/resultado, não em quem fez.","formula":"be + past participle","example":"The issue was resolved this morning.","pt":"O problema foi resolvido esta manhã.","mistake":"The issue resolved this morning.","fix":"The issue was resolved this morning.","tip":"Muito usado em ambiente profissional e relatórios."},{"title":"Questions","when":"Pedir informação com clareza.","formula":"Auxiliary + subject + verb?","example":"Can you confirm the deadline?","pt":"Você pode confirmar o prazo?","mistake":"You can confirm the deadline?","fix":"Can you confirm the deadline?","tip":"Em inglês formal, a ordem da pergunta importa."},{"title":"Prepositions","when":"Tempo, lugar, responsabilidade e contexto.","formula":"on Monday / in July / at 9 / responsible for / depend on","example":"I’m responsible for the delivery plan.","pt":"Sou responsável pelo plano de entrega.","mistake":"responsible of","fix":"responsible for","tip":"Aprenda preposições por bloco, não isoladas."},{"title":"Gerund after difficulty","when":"Depois de difficulty, trouble, problem e worth, use verbo com -ing.","formula":"difficulty + verb-ing","example":"I have difficulty speaking in large meetings.","pt":"Tenho dificuldade para falar em reuniões grandes.","mistake":"I have difficulty to speak.","fix":"I have difficulty speaking.","tip":"Essa regra ajuda muito brasileiros porque “para falar” parece pedir “to speak”, mas em inglês natural é “speaking”."},{"title":"Used to vs be used to","when":"Used to fala de hábito no passado; be used to fala de estar acostumado.","formula":"used to + verb / be used to + noun or -ing","example":"I used to avoid speaking English, but now I am used to practicing every day.","pt":"Eu costumava evitar falar inglês, mas agora estou acostumada a praticar todos os dias.","mistake":"I am used to speak English every day.","fix":"I am used to speaking English every day.","tip":"Depois de “be used to”, use substantivo ou verbo com -ing."},{"title":"Reported speech","when":"Para relatar o que alguém disse em reunião, status ou ata.","formula":"said that / asked if / told us to","example":"The architect said that the integration would require a new contract.","pt":"O arquiteto disse que a integração exigiria um novo contrato.","mistake":"He said me that...","fix":"He told me that... / He said that...","tip":"Use “tell someone” ou “say that”. Não diga “said me”."},{"title":"Relative clauses","when":"Para explicar pessoas, sistemas, dados e decisões com mais precisão.","formula":"who / which / that","example":"The dashboard that tracks data quality is used by the governance team.","pt":"O dashboard que acompanha qualidade de dados é usado pelo time de governança.","mistake":"The dashboard what tracks...","fix":"The dashboard that tracks...","tip":"Use “who” para pessoas e “which/that” para coisas, sistemas e ideias."},{"title":"Comparatives for trade-offs","when":"Para comparar opções técnicas, prazo, custo, risco e qualidade.","formula":"safer than / more scalable than / less risky than","example":"This option is more scalable, but it is also more expensive.","pt":"Esta opção é mais escalável, mas também é mais cara.","mistake":"more easy / more safe","fix":"easier / safer","tip":"Palavras curtas geralmente usam -er: easier, safer, faster. Palavras longas usam more: more reliable."},{"title":"Cause and effect","when":"Para explicar incidentes, atrasos, bugs e decisões.","formula":"because / due to / therefore / as a result","example":"The release was delayed because the integration tests failed.","pt":"A release atrasou porque os testes de integração falharam.","mistake":"The release delayed because...","fix":"The release was delayed because...","tip":"Se algo sofreu atraso, use passive voice: was delayed."},{"title":"Polite requests","when":"Para pedir algo sem soar rude em inglês profissional.","formula":"Could you / Would you mind / Could we","example":"Could you review the access request before the end of the day?","pt":"Você poderia revisar a solicitação de acesso até o fim do dia?","mistake":"Review this today.","fix":"Could you review this today?","tip":"Em ambiente internacional, ser direto demais pode soar seco. Use Could you para suavizar."},{"title":"Hedging","when":"Para dar opinião com cuidado quando ainda há incerteza.","formula":"It seems that / It looks like / We may need","example":"It looks like we may need to revisit the architecture decision.","pt":"Parece que talvez precisemos revisar a decisão de arquitetura.","mistake":"This is wrong.","fix":"It looks like this may not be the best option.","tip":"Hedging ajuda a discordar com diplomacia."}],"sounds":[{"title":"TH /θ/","examples":"think, three, thanks","tip":"Coloque a língua levemente entre os dentes. Não vira T nem F.","phrase":"thanks for the update","pt":"Obrigada pela atualização.","cue":"thanks for the update → “thénks fór dhi ãp-deit”"},{"title":"TH /ð/","examples":"this, that, there","tip":"Mesmo ponto da língua, mas com vibração da voz.","phrase":"this is the main issue","pt":"Este é o principal problema.","cue":"this is the main issue → “dhis iz dhê mein í-shu”"},{"title":"R","examples":"risk, review, roadmap","tip":"O R do inglês não vibra como em português. A língua fica para trás.","phrase":"review the risk report","pt":"revisar o relatório de riscos","cue":""},{"title":"V vs W","examples":"very / where, vendor / window","tip":"V usa os dentes no lábio. W arredonda os lábios.","phrase":"the vendor will review it","pt":"O fornecedor vai revisar isso.","cue":""},{"title":"ED endings","examples":"worked, needed, resolved","tip":"ED pode soar T, D ou ID. Não pronuncie sempre como 'édi'.","phrase":"we fixed the bug","pt":"Corrigimos o bug.","cue":""},{"title":"Schwa /ə/","examples":"about, support, important","tip":"Som fraco e relaxado. Essencial para soar natural.","phrase":"I need support from the team","pt":"Preciso de apoio do time.","cue":""},{"title":"Linking","examples":"turn it on, check it out","tip":"Palavras se conectam na fala natural.","phrase":"can you check it out?","pt":"Você pode verificar isso?","cue":""},{"title":"Stress","examples":"INfrastructure, dePLOYment","tip":"Inglês tem sílabas fortes e fracas. Não pronuncie tudo com a mesma força.","phrase":"infrastructure deployment","pt":"implantação de infraestrutura","cue":""},{"title":"Word stress","examples":"architecture, development, observability","tip":"Inglês tem sílaba forte. Se a força cair no lugar errado, a palavra fica difícil de entender.","phrase":"Observability helps us understand production issues.","pt":"Observabilidade nos ajuda a entender problemas em produção.","cue":"ob-zâr-vâ-bi-li-ti helps ãs ãn-dâr-sténd prâ-dâk-shãn í-shuz"},{"title":"Chunking","examples":"frases em blocos","tip":"Não tente falar palavra por palavra. Fale em blocos: I need to / follow up / with the data team.","phrase":"I need to follow up with the data engineering team.","pt":"Preciso acompanhar/cobrar retorno do time de engenharia de dados.","cue":"ai nid tchu fá-lou ãp / uíth dhâ dêi-tâ en-dji-nír-ing tim"},{"title":"Intonation in questions","examples":"Could you...? What do you...?","tip":"Perguntas com “Could you” sobem levemente no final. Perguntas com “What/Why/How” descem no final.","phrase":"Could you clarify the acceptance criteria?","pt":"Você poderia esclarecer os critérios de aceite?","cue":"kud iu clá-ri-fai dhi ák-sép-tâns krai-tí-ri-â"}],"scenes":[{"title":"Cena estilo série: reunião tensa de projeto","level":"B1-B2","context":"Cliente quer antecipar prazo, time técnico alerta risco.","lines":[["Client","Can we move the deadline to next Friday?","Podemos antecipar o prazo para a próxima sexta?"],["You","We can discuss it, but I need to be transparent about the risks.","Podemos discutir isso, mas preciso ser transparente sobre os riscos."],["Developer","If we reduce the testing time, we may miss critical defects.","Se reduzirmos o tempo de testes, podemos deixar passar defeitos críticos."],["You","My recommendation is to keep the date or reduce the scope.","Minha recomendação é manter a data ou reduzir o escopo."],["Client","What would you remove from the scope?","O que você removeria do escopo?"],["You","I would move the reporting dashboard to phase two.","Eu moveria o dashboard de relatórios para a fase dois."]],"focus":"Negociação, riscos, condição e recomendação."},{"title":"Cena estilo série: daily com time remoto","level":"A2-B1","context":"Você precisa falar de status sem travar.","lines":[["Scrum Master","What did you work on yesterday?","No que você trabalhou ontem?"],["You","Yesterday, I reviewed the timeline and followed up with the vendor.","Ontem, revisei o cronograma e cobrei retorno do fornecedor."],["Scrum Master","What will you do today?","O que você fará hoje?"],["You","Today, I will align the dependencies with the infrastructure team.","Hoje, vou alinhar as dependências com o time de infraestrutura."],["Scrum Master","Any blockers?","Algum bloqueio?"],["You","Yes. We are waiting for access approval.","Sim. Estamos aguardando aprovação de acesso."]],"focus":"Simple Past, will, blockers."},{"title":"Cena estilo filme: aeroporto e viagem de trabalho","level":"A2-B1","context":"Inglês para viagem profissional.","lines":[["Agent","What is the purpose of your trip?","Qual é o propósito da sua viagem?"],["You","I’m traveling for a business meeting and a technology conference.","Estou viajando para uma reunião de negócios e uma conferência de tecnologia."],["Agent","How long will you stay?","Quanto tempo você vai ficar?"],["You","I’ll stay for five days.","Vou ficar por cinco dias."],["Agent","Where are you staying?","Onde você ficará hospedada?"],["You","I’m staying at a hotel near the conference center.","Ficarei em um hotel perto do centro de conferências."]],"focus":"Viagem, respostas curtas, clareza."},{"title":"Cena estilo escritório: conflito com stakeholder","level":"B2","context":"Stakeholder quer mudança fora do escopo.","lines":[["Stakeholder","This change should be simple. Can we include it in this release?","Essa mudança deve ser simples. Podemos incluir nesta release?"],["You","It may look simple, but it affects the integration flow.","Pode parecer simples, mas afeta o fluxo de integração."],["Stakeholder","So what do you suggest?","Então o que você sugere?"],["You","I suggest we evaluate the impact and create a change request.","Sugiro avaliarmos o impacto e criarmos uma solicitação de mudança."],["Stakeholder","Will this delay the project?","Isso vai atrasar o projeto?"],["You","It might, depending on the development effort.","Pode atrasar, dependendo do esforço de desenvolvimento."]],"focus":"Escopo, mudança, diplomacia."},{"title":"Status report executivo","level":"B2-C1","context":"Você precisa resumir status, risco e decisão para liderança.","focus":"Resumo executivo, risco, decisão e recomendação.","lines":[["Director","Can you summarize the project status in two minutes?","Você consegue resumir o status do projeto em dois minutos?"],["You","Sure. Overall, we are on track for the MVP, but we have one critical dependency related to data access approval.","Claro. No geral, estamos no prazo para o MVP, mas temos uma dependência crítica relacionada à aprovação de acesso aos dados."],["Director","What is the impact if the approval is delayed?","Qual é o impacto se a aprovação atrasar?"],["You","If approval slips by more than three days, the analytics validation may move to the next sprint.","Se a aprovação atrasar mais de três dias, a validação analítica pode ir para a próxima sprint."],["Director","What do you recommend?","O que você recomenda?"],["You","I recommend escalating the approval today and keeping scope unchanged until Friday.","Recomendo escalar a aprovação hoje e manter o escopo sem mudança até sexta-feira."]]},{"title":"Review de produto de dados","level":"B2-C1","context":"Time apresenta um produto de dados para consumidores e governança.","focus":"Data product, qualidade, catálogo, governança e consumidores.","lines":[["Product Manager","Who are the primary consumers of this data product?","Quem são os consumidores principais deste produto de dados?"],["You","The primary consumers are the finance analytics team and the customer insights squad.","Os consumidores principais são o time de analytics financeiro e a squad de customer insights."],["Data Engineer","The pipeline is stable, but we still need to improve lineage documentation.","O pipeline está estável, mas ainda precisamos melhorar a documentação de linhagem."],["You","Let us publish the product with a clear quality scorecard and a visible backlog for lineage improvements.","Vamos publicar o produto com um scorecard de qualidade claro e um backlog visível para melhorias de linhagem."],["Governance Lead","How will access be approved?","Como o acesso será aprovado?"],["You","Access will follow the standard policy, and exceptions will require business justification and owner approval.","O acesso seguirá a política padrão, e exceções exigirão justificativa de negócio e aprovação do owner."]]},{"title":"Arquitetura e interoperabilidade","level":"C1-C2","context":"Discussão técnica com arquiteto, engenharia e segurança.","focus":"Arquitetura, trade-offs, interoperabilidade, observabilidade e risco.","lines":[["Architect","The main concern is interoperability between the legacy platform and the new SDK.","A principal preocupação é a interoperabilidade entre a plataforma legada e o novo SDK."],["You","I understand. From a delivery perspective, we need a phased rollout with clear rollback criteria.","Entendo. Do ponto de vista de entrega, precisamos de um rollout faseado com critérios claros de rollback."],["Engineer","We can instrument the integration with logs, metrics, and distributed tracing.","Podemos instrumentar a integração com logs, métricas e tracing distribuído."],["You","That would reduce operational risk and give us enough evidence before scaling to all teams.","Isso reduziria o risco operacional e nos daria evidências suficientes antes de escalar para todos os times."],["Security","We also need to review authentication flows and data exposure.","Também precisamos revisar fluxos de autenticação e exposição de dados."],["You","Agreed. Let us include security sign-off as a gate before production rollout.","Concordo. Vamos incluir sign-off de segurança como gate antes do rollout em produção."]]},{"title":"Retrospectiva com cultura inclusiva","level":"B1-B2","context":"Você conduz retro incentivando participação e segurança psicológica.","focus":"Diversidade, equidade, facilitação e feedback.","lines":[["You","Before we start, I want to make sure every voice is heard today.","Antes de começarmos, quero garantir que todas as vozes sejam ouvidas hoje."],["Developer","I think some decisions were made too quickly.","Acho que algumas decisões foram tomadas rápido demais."],["You","Thank you for raising that. Could you share one example so we can learn from it?","Obrigada por levantar isso. Você poderia compartilhar um exemplo para aprendermos com ele?"],["Designer","I agree. We also need more context before refinement.","Concordo. Também precisamos de mais contexto antes do refinement."],["You","Let us turn that into an action item: improve context before refinement and document assumptions earlier.","Vamos transformar isso em item de ação: melhorar contexto antes do refinement e documentar premissas mais cedo."]]}],"modules":[{"title":"Mapa Mental","desc":"Navegue por fluência, pronúncia, gramática, vocabulário, speaking, listening, writing e contexto profissional."},{"title":"Plano A2 → Fluente","desc":"Trilha com mais de 500 dias, evoluindo de frases curtas até discussões C2 e fluência executiva."},{"title":"Verbos Essenciais","desc":"Verbos principais, formas, exemplos de TI, tradução e prática objetiva."},{"title":"Expressões","desc":"Frases prontas para reuniões, projetos, dados, IA, arquitetura, diversidade e carreira."},{"title":"Gramática Objetiva","desc":"Regras, uso correto, erros comuns de brasileiros, exemplo e dica prática."},{"title":"Pronúncia","desc":"Sons difíceis, ritmo, entonação, blocos de fala e como pronunciar por aproximação."},{"title":"Tech & Data","desc":"Vocabulário de produto, dados, engenharia, arquitetura, IA, testes, bugs, governança e senioridade."},{"title":"Cenas Reais","desc":"Conversas estilo série para daily, status report, review, retro, produto de dados e arquitetura."},{"title":"Music Lab","desc":"Aprenda inglês cantando músicas do estilo Imagine Dragons, Coldplay e bandas parecidas, com ritmo, pronúncia, vocabulário e prática de shadowing sem depender de letras completas."},{"title":"AI Coach","desc":"Prompts, arquitetura futura e preparação para correção, conversa e voz neural com backend seguro."}],"plan":[{"day":1,"level":"A2","levelTitle":"A2 → B1: destravar base","phase":"base, sobrevivência profissional, frases curtas e medo de falar","skill":"Pronúncia","task":"Treine ritmo e sons difíceis usando a frase: I need help with this task.","deliverable":"1 áudio curto + 1 frase escrita + 1 revisão","phrase":"I need help with this task.","translation":"Preciso de ajuda com esta tarefa.","pronunciation":"ai nid help uíth dhis task"},{"day":2,"level":"A2","levelTitle":"A2 → B1: destravar base","phase":"bas function localWritingCheck(inputId,resultId){ const text=$(inputId).value.trim(); if(!text){toast('Digite um texto primeiro.'); return;} let tips=[]; const checks=[[/difficulty to /i,'Use “difficulty + verb-ing”: difficulty speaking, not difficulty to speak.'],[/I am agree/i,'Use “I agree”, not “I am agree”.'],[/depends of/i,'Use “depends on”, not depends of.'],[/responsible of/i,'Use “responsible for”, not responsible of.'],[/will to /i,'After will, use the base verb: will send, not will to send.'],[/should to /i,'After should, use base verb: should review.'],[/I have .* years/i,'If you mean experience until now, consider Present Perfect: I have worked... for X years.'],[/discuss about/i,'Use “discuss the topic”, not “discuss about the topic”.'],[/explain me/i,'Use “explain it to me”, not “explain me”.'],[/informations/i,'Information is usually uncountable: use “information”, not “informations”.'],[/doubt/i,'For a question, use “question”, not “doubt”.']]; checks.forEach(([re,msg])=>{if(re.test(text)) tips.push(msg)}); if(text.split(/\s+/).length<12) tips.push('Tente escrever pelo menos 2 frases para treinar estrutura.'); const score=Math.max(58,95-tips.length*10); $(resultId).innerHTML=`<div class="coach-box" style="margin-top:12px"><b>Resultado local: ${score}%</b><p>${tips.length?tips.map(t=>'• '+t).join('<br>'):'Boa estrutura inicial. Próximo passo: tornar a frase mais natural e específica.'}</p><p class="muted mini">Observação: isso é uma correção local por regras. A correção completa por IA precisa de backend seguro.</p></div>` }

let allowWeakVoice=false;
function voiceScore(v){let s=0; const n=(v.name+' '+v.lang).toLowerCase(); if(/^en/.test(v.lang))s+=30; ['google us english','google uk english','microsoft aria','microsoft jenny','microsoft guy','natural','samantha','ava','alex','daniel','karen','moira','english united states','en-us'].forEach(k=>{if(n.includes(k))s+=10}); if(n.includes('compact')||n.includes('robot'))s-=20; return s}
